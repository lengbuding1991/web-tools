<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布丁实验室 | 大本营</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        :root { --main-blue: #3b82f6; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .tech-grid { background-image: radial-gradient(rgba(59, 130, 246, 0.12) 1px, transparent 0); background-size: 40px 40px; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 🚀 统一通知 Toast 样式 */
        #notify-container { position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .notify-card { pointer-events: auto; min-width: 280px; padding: 16px 20px; border-radius: 12px; border: 1px solid rgba(59, 130, 246, 0.3); background: rgba(15, 23, 42, 0.95); animation: slideIn 0.4s forwards; }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="tech-grid min-h-screen flex flex-col">
    <div id="notify-container"></div> 

    <nav class="h-20 flex items-center justify-between px-6 md:px-8 glass border-b border-white/5 sticky top-0 z-50">
        <div class="flex items-center gap-3 md:gap-4">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-white shadow-lg text-xl shadow-blue-500/20">B</div>
            <div>
                <h1 class="text-xs md:text-sm font-black text-white tracking-widest uppercase">Pudding Lab</h1>
                <p class="text-[8px] md:text-[9px] text-blue-500 font-bold tracking-[0.2em] md:tracking-[0.3em]">资产实验基地</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div id="authStatusArea"><button onclick="toggleAuthModal()" class="px-4 md:px-6 py-2 bg-blue-600/10 border border-blue-500/40 rounded-full text-[9px] md:text-[10px] font-black text-blue-400 uppercase tracking-widest hover:bg-blue-600/20 transition-all">接入实验室</button></div>
            <div id="userProfileArea" class="hidden flex items-center gap-2 md:gap-4">
                <a href="/dashboard/" class="px-3 md:px-4 py-1.5 bg-purple-600/10 border border-purple-500/40 rounded-full text-[9px] md:text-[10px] font-black text-purple-400 hover:bg-purple-600 hover:text-white transition-all">金库</a>
                <button onclick="handleLogout()" class="text-[9px] md:text-[10px] font-bold text-slate-600 hover:text-red-400 uppercase mono ml-2">Logout</button>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto w-full pt-10 md:pt-20 pb-10 px-6 md:px-8 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
        <div>
            <h2 id="welcomeTitle" class="text-4xl md:text-8xl font-black tracking-tighter text-white leading-[0.95] md:leading-[0.9]">折腾出<br><span class="text-blue-500 italic">真实价值。</span></h2>
            <p class="mt-6 md:mt-8 text-slate-400 max-w-xl text-xs md:text-sm leading-relaxed">基于 DeepSeek 深度算力与地理套利逻辑，将瞬间灵感转化为硬核资产的极客试验场。</p>
        </div>
        <div class="glass p-6 md:p-8 rounded-[2rem] border-white/5 relative h-44 md:h-64 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <span class="text-[10px] font-black text-blue-500 mono tracking-widest uppercase flex items-center gap-2">
                    <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-ping"></span> 实验室情报脉动
                </span>
                <span class="text-[9px] text-slate-600 mono" id="wallStatus">STANDBY</span>
            </div>
            <div id="intelligenceWall" class="flex-1 space-y-3 mono text-[10px] md:text-[11px] overflow-hidden">
                <div class="text-slate-700 italic">> 正在监听加密链路...</div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto w-full px-6 md:px-8 py-4 md:py-10 grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
        <a href="/factory/" class="glass p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] flex flex-col justify-between h-64 md:h-80 border border-white/5 hover:border-blue-500 transition-all group">
            <div class="w-12 h-12 bg-blue-600/10 border border-blue-500/20 rounded-2xl flex items-center justify-center text-2xl group-hover:bg-blue-600 group-hover:text-white transition-all">⚡</div>
            <div>
                <h3 class="text-2xl md:text-3xl font-black text-white mb-2 tracking-tight">灵感价值工厂</h3>
                <p class="text-[9px] text-slate-500 mb-4 uppercase mono">Inspired_Asset_Production</p>
                <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest group-hover:translate-x-2 transition-transform inline-block">进入车间 Enter →</span>
            </div>
        </a>
        <a href="/radar/" class="glass p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] flex flex-col justify-between h-64 md:h-80 border border-white/5 hover:border-emerald-500 transition-all group">
            <div class="w-12 h-12 bg-emerald-600/10 border border-emerald-500/20 rounded-2xl flex items-center justify-center text-2xl group-hover:bg-emerald-600 group-hover:text-white transition-all">🌍</div>
            <div>
                <h3 class="text-2xl md:text-3xl font-black text-white mb-2 tracking-tight">全球套利雷达</h3>
                <p class="text-[9px] text-slate-500 mb-4 uppercase mono">Geo_Arbitrage_Scanner</p>
                <span class="text-emerald-500 text-[10px] font-black uppercase tracking-widest group-hover:translate-x-2 transition-transform inline-block">启动扫描 Launch →</span>
            </div>
        </a>
    </main>

    <div id="authModal" class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/95 backdrop-blur-xl hidden">
        <div class="w-full max-w-md glass p-8 md:p-10 rounded-[2.5rem] md:rounded-[3rem] border-blue-500/30">
            <h3 id="modalTitle" class="text-3xl font-black text-white mb-8 italic text-center uppercase tracking-tighter">身份接入</h3>
            <form id="authForm" class="space-y-4">
                <input type="email" id="authEmail" placeholder="认证邮箱" required class="w-full px-6 py-4 rounded-xl text-sm outline-none bg-slate-900 border border-white/5 text-white focus:ring-1 ring-blue-500">
                <input type="password" id="authPassword" placeholder="访问密钥" required class="w-full px-6 py-4 rounded-xl text-sm outline-none bg-slate-900 border border-white/5 text-white focus:ring-1 ring-blue-500">
                <div id="registerFields" class="hidden"><input type="text" id="authUsername" placeholder="特工代号 (Agent ID)" class="w-full px-6 py-4 rounded-xl text-sm outline-none bg-slate-900 border border-white/5 text-white mt-4"></div>
                <button type="submit" id="authSubmit" class="w-full py-5 mt-6 bg-blue-600 text-white font-black rounded-xl text-xs uppercase tracking-[0.2em] hover:bg-blue-500 transition-all">确认接入 Access</button>
            </form>
            <div class="flex justify-between mt-8 pt-6 border-t border-white/10">
                <button onclick="toggleRegMode()" class="text-[9px] text-slate-500 hover:text-blue-400 mono">APPLY_ID</button>
                <button onclick="toggleAuthModal()" class="text-[9px] text-slate-500 mono">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        const AUTH_API = "https://nas-n8n.lbuding.com/webhook/auth";
        const ASSETS_API = "https://nas-n8n.lbuding.com/webhook/get-user-assets";
        let isRegisterMode = false;

        function showNotify(msg) {
            const container = document.getElementById('notify-container');
            const card = document.createElement('div');
            card.className = `notify-card mono text-[11px] font-bold text-blue-400`;
            card.innerHTML = `⚡ ${msg}`;
            container.appendChild(card);
            setTimeout(() => { card.style.opacity = '0'; setTimeout(() => card.remove(), 500); }, 3000);
        }

        async function loadWall() {
            const t = localStorage.getItem('pudding_token'), e = localStorage.getItem('pudding_email'); if(!t || !e) return;
            try {
                const res = await fetch(ASSETS_API, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${t}` }, body: JSON.stringify({ email: e }) });
                const data = await res.json();
                const all = [...(data.factory || []).map(i => ({t:'FACTORY', n:i.sector})), ...(data.radar || []).map(i => ({t:'RADAR', n:i.location}))].slice(0, 3);
                document.getElementById('intelligenceWall').innerHTML = all.length ? all.map(i => `<div class='flex gap-3 text-blue-400 animate-pulse'><span class='text-slate-600'>[${i.t}]</span><span class='truncate'>${i.n.toUpperCase()}</span></div>`).join('') : "档案库为空";
                document.getElementById('wallStatus').innerText = "LIVE_DATA";
            } catch(e) { document.getElementById('wallStatus').innerText = "SYNC_ERR"; }
        }

        function localCheck() {
            const t = localStorage.getItem('pudding_token'), u = localStorage.getItem('pudding_user');
            if(t && u) {
                document.getElementById('authStatusArea').classList.add('hidden');
                document.getElementById('userProfileArea').classList.remove('hidden');
                document.getElementById('welcomeTitle').innerHTML = `欢迎回来，<br><span class='text-blue-500'>Agent ${u}</span>。`;
                loadWall();
            }
        }

        function toggleAuthModal() { document.getElementById('authModal').classList.toggle('hidden'); }
        function toggleRegMode() { isRegisterMode = !isRegisterMode; document.getElementById('registerFields').classList.toggle('hidden'); document.getElementById('modalTitle').innerText = isRegisterMode ? "申请代号" : "身份接入"; }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('authSubmit'); btn.innerText = "VERIFYING..."; btn.disabled = true;
            try {
                const res = await fetch(AUTH_API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: isRegisterMode ? 'register' : 'login', email: document.getElementById('authEmail').value, password: document.getElementById('authPassword').value, username: document.getElementById('authUsername').value }) });
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('pudding_token', data.token);
                    localStorage.setItem('pudding_user', data.username || "Agent");
                    localStorage.setItem('pudding_email', document.getElementById('authEmail').value);
                    showNotify("身份验证成功，欢迎接入。");
                    setTimeout(() => location.reload(), 1000);
                } else { showNotify("凭证无效，访问被拒绝。"); }
            } catch (err) { showNotify("链路阻塞"); } finally { btn.disabled = false; btn.innerText = "Access"; }
        });

        function handleLogout() { localStorage.clear(); location.reload(); }
        window.addEventListener('DOMContentLoaded', localCheck);
    </script>
</body>
</html>
