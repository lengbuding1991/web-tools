<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LBUDING Matrix | 数字化套利中枢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'JetBrains Mono', monospace; }
        .matrix-bg { background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%); }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-border { border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 25px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body class="matrix-bg min-h-screen">

    <nav class="p-6 border-b border-white/5 flex justify-between items-center max-w-7xl mx-auto">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg shadow-blue-500/20">B</div>
            <div>
                <h1 class="font-black text-xl tracking-tighter uppercase">Lbuding Matrix</h1>
                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-[0.3em]">Automated Intelligence Hub</p>
            </div>
        </div>
        <div class="flex items-center gap-6 text-[10px] font-bold uppercase tracking-widest text-slate-500">
            <div class="flex items-center gap-2"><span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> Nodes: Active</div>
            <div id="userBadge" class="hidden px-3 py-1 glass rounded-full border border-blue-500/20 text-blue-400">Identified</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-20 grid grid-cols-1 lg:grid-cols-12 gap-12">
        <div class="lg:col-span-5 space-y-8">
            <header>
                <h2 class="text-5xl lg:text-7xl font-black tracking-tighter leading-none mb-6">折腾<br><span class="text-blue-500">创造价值</span></h2>
                <p class="text-slate-500 text-sm leading-relaxed max-w-md">基于 DeepSeek-V3 的套利引擎。我们不计算生存期，我们计算如何在 2026 年通过自动化挖掘不对称收益。</p>
            </header>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-6 rounded-3xl">
                    <p class="text-[10px] text-slate-500 mb-2 uppercase font-bold">已识别机会</p>
                    <p class="text-3xl font-black text-white" id="stat-opps">1,204</p>
                </div>
                <div class="glass p-6 rounded-3xl">
                    <p class="text-[10px] text-slate-500 mb-2 uppercase font-bold">已入库画像</p>
                    <p class="text-3xl font-black text-white" id="stat-users">0</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div class="glass p-8 md:p-12 rounded-[3rem] glow-border relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-blue-600/5 blur-[100px]"></div>
                
                <h3 class="text-2xl font-black mb-8 flex items-center gap-3">
                    <span class="w-2 h-8 bg-blue-500 rounded-full"></span>
                    变现路径嗅探器
                </h3>

                <form id="arbitrageForm" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">擅长技能 / Core Skills</label>
                            <input type="text" id="skills" required placeholder="如：Python, 视频剪辑, 英语" class="w-full px-6 py-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-blue-500 transition-all text-sm">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">每日投入时长 / Hours Daily</label>
                            <input type="number" id="hours" required placeholder="2" class="w-full px-6 py-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-blue-500 transition-all text-sm">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">当前关注领域 / Interests</label>
                        <select id="interest" class="w-full px-6 py-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-blue-500 transition-all text-sm appearance-none cursor-pointer">
                            <option value="AI自动化">AI 自动化 (No-code/LLM)</option>
                            <option value="内容出海">内容出海 (TikTok/YouTube)</option>
                            <option value="数字资产套利">数字资产套利 (Domain/GPU)</option>
                            <option value="Micro-SaaS">Micro-SaaS 独立开发</option>
                        </select>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full btn-primary text-white font-black py-5 rounded-2xl text-xs uppercase tracking-[0.3em]">
                        生成自动化套利蓝图
                    </button>
                </form>

                <div id="resultBox" class="hidden mt-10 space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
                    <div class="p-6 rounded-3xl bg-blue-500/10 border border-blue-500/20">
                        <p class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-3">Blueprint Detected</p>
                        <div id="aiOutput" class="text-sm leading-relaxed text-slate-300 font-medium whitespace-pre-wrap"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://nas-n8n.lbuding.com/webhook/opportunity-scanner";
        const PROFILE_API = "https://nas-n8n.lbuding.com/webhook/get-user-profile";
        const fpPromise = FingerprintJS.load();

        async function recall() {
            const fp = await fpPromise;
            const vid = (await fp.get()).visitorId;
            const res = await fetch(PROFILE_API, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ visitor_id: vid })
            });
            const data = await res.json();
            if(data.total_interactions) {
                document.getElementById('stat-users').innerText = data.total_interactions + 520; // 模拟虚假繁荣增加逼格
                document.getElementById('userBadge').classList.remove('hidden');
                document.getElementById('userBadge').innerText = `RECALLED: ${vid.substring(0,8)}`;
            }
        }

        document.getElementById('arbitrageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "SCANNING GLOBAL MARKET...";

            const fp = await fpPromise;
            const vid = (await fp.get()).visitorId;

            const payload = {
                visitor_id: vid,
                skills: document.getElementById('skills').value,
                hours: document.getElementById('hours').value,
                interest: document.getElementById('interest').value
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                document.getElementById('aiOutput').innerText = data.blueprint;
                document.getElementById('resultBox').classList.remove('hidden');
            } catch (e) { alert("CONNECTION FAILED"); }
            finally { btn.disabled = false; btn.innerText = "REFRESH BLUEPRINT"; }
        });

        window.onload = recall;
    </script>
</body>
</html>
