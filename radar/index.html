<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球套利雷达 - 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --main-emerald: #10b981; --bg-dark: #020617; }
        
        body { background-color: var(--bg-dark); color: #94a3b8; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        .tech-grid { background-image: radial-gradient(rgba(16, 185, 129, 0.1) 1px, transparent 0); background-size: 30px 30px; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(168, 185, 129, 0.15); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 极致丝滑的快速加载屏 */
        #lockscreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: opacity 0.4s ease; }
        
        #notify-container { position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .notify-card { pointer-events: auto; min-width: 280px; padding: 16px 20px; border-radius: 12px; border: 1px solid; animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); display: flex; align-items: center; gap: 12px; }
        .notify-error { border-color: #ef4444; color: #fca5a5; }
        .notify-success { border-color: #10b981; color: #a7f3d0; }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

        #posterWrapper { position: fixed; top: -9999px; left: -9999px; width: 600px; background: #050a15; z-index: -1; }
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: #f8fafc !important; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.3); border-radius: 4px; }
        
        .prose h1, .prose h2, .prose h3, .prose strong { color: #f8fafc !important; }
        .prose a { color: #34d399 !important; }
    </style>
</head>
<body class="tech-grid flex flex-col md:flex-row w-full h-screen overflow-hidden">

    <div id="notify-container"></div>

    <div id="lockscreen">
        <div class="text-emerald-500 font-bold mono animate-pulse tracking-[0.5em] text-lg uppercase">Radar_Syncing...</div>
    </div>

    <aside class="w-full md:w-80 p-6 md:p-8 flex flex-col gap-6 shrink-0 glass-panel h-auto md:h-full z-20 border-r border-white/5 shadow-2xl">
        <div class="flex items-center gap-3 shrink-0">
            <div class="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center font-black text-white text-2xl shadow-[0_0_20px_rgba(16,185,129,0.4)]">布</div>
            <div>
                <h2 class="font-black text-white text-xl tracking-wide">全球套利雷达</h2>
                <span class="text-[9px] text-emerald-500 mono uppercase tracking-widest">Geo-Arbitrage System</span>
            </div>
        </div>
        <div class="p-5 bg-[#050a15] rounded-xl border border-white/5 mono text-[10px] text-slate-500 flex-1 overflow-y-auto hidden md:block shadow-inner" id="logs">
            > 初始化雷达阵列...<br>> 卫星数据链已就绪...<br>> 正在监听全球差价信号。
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden z-10">
        
        <header class="h-20 shrink-0 flex items-center justify-between px-8 border-b border-white/5 glass-panel z-10 shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_#10b981]"></div>
                <span class="text-[11px] font-bold text-slate-400 mono tracking-widest" id="userTag">STATION_ACTIVE</span>
            </div>
            <a href="/dashboard/" class="px-5 py-2 border border-purple-500/30 rounded-full text-[10px] font-bold uppercase text-purple-400 hover:bg-purple-600 hover:text-white transition-all ml-auto mr-4 shadow-sm">进入金库</a>
            <a href="/" class="px-5 py-2 border border-white/10 rounded-full text-[10px] font-bold uppercase text-slate-400 hover:bg-emerald-600 hover:text-white transition-all shadow-sm">返回基地</a>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-10 lg:p-16 scroll-smooth" id="scrollArea">
            <div class="max-w-4xl mx-auto space-y-12 pb-32">
                
                <div class="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-xl">
                    <form id="radarForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-3">
                            <label class="text-[10px] uppercase font-black text-emerald-500 tracking-widest ml-1">目标探测坐标</label>
                            <input type="text" id="location" required placeholder="如: 泰国曼谷 / 日本东京" class="w-full px-6 py-4 bg-[#0a1122] border border-white/10 rounded-xl text-sm text-white focus:border-emerald-500 outline-none transition-all placeholder-slate-600">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[10px] uppercase font-black text-emerald-500 tracking-widest ml-1">可用资产规模</label>
                            <input type="text" id="assets" required placeholder="如: 50万人民币" class="w-full px-6 py-4 bg-[#0a1122] border border-white/10 rounded-xl text-sm text-white focus:border-emerald-500 outline-none transition-all placeholder-slate-600">
                        </div>
                        <div class="md:col-span-2 space-y-3">
                            <label class="text-[10px] uppercase font-black text-emerald-500 tracking-widest ml-1">锁定降维波段</label>
                            <select id="niche" class="w-full px-6 py-4 bg-[#0a1122] border border-white/10 rounded-xl text-sm text-white focus:border-emerald-500 outline-none transition-all cursor-pointer">
                                <option value="数字游民生活套利">💻 数字游民高薪低消费生活套利</option>
                                <option value="跨境电商商品差价">🛒 跨境电商与实体商品差价网络</option>
                                <option value="Web3与资产全球化">🌍 Web3 与个人数字资产全球化</option>
                            </select>
                        </div>
                        <button type="submit" id="submitBtn" class="md:col-span-2 py-5 mt-4 bg-emerald-600 text-white font-black rounded-xl text-sm uppercase tracking-widest hover:bg-emerald-500 active:scale-95 transition-all shadow-[0_0_20px_rgba(16,185,129,0.3)]">启动雷达 · 扫描全球套利空间</button>
                    </form>
                </div>

                <div id="resultArea" class="hidden glass-panel p-8 md:p-14 rounded-[3rem] shadow-2xl border border-emerald-500/20">
                    <div id="blueprintContent" class="prose prose-invert prose-emerald max-w-none text-slate-300 leading-relaxed"></div>
                    <div class="mt-16 pt-8 border-t border-white/10 flex justify-end">
                        <button onclick="generatePoster()" id="posterBtn" class="px-8 py-4 bg-emerald-600/10 border border-emerald-500/30 text-emerald-400 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-emerald-600 hover:text-white transition-all">↓ 导出情报海报</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="posterWrapper" class="p-16 border-4 border-emerald-500/20">
        <h2 class="text-white text-4xl font-black mb-2 uppercase italic tracking-tighter">Pudding Lab Radar</h2>
        <p class="text-emerald-500 text-xs mono mb-12 tracking-[0.4em] uppercase">Geo_Arbitrage_Intelligence</p>
        <div id="posterContent" class="prose prose-invert prose-emerald max-w-none"></div>
    </div>

    <script>
        const RADAR_API = "https://nas-n8n.lbuding.com/webhook/radar-engine";

        function showNotify(msg, type = 'info') {
            const container = document.getElementById('notify-container');
            const card = document.createElement('div');
            card.className = `notify-card notify-${type} mono text-[11px] font-bold`;
            const icon = type === 'error' ? '⚠️' : type === 'success' ? '✅' : '🌍';
            card.innerHTML = `<span class="text-xl">${icon}</span><div><div class="leading-tight">${msg}</div></div>`;
            container.appendChild(card);
            setTimeout(() => { card.style.animation = 'fadeOut 0.5s forwards'; setTimeout(() => card.remove(), 500); }, 3500);
        }

        // 🚀 优化后的进门逻辑：本地信任，移除 PROFILE_API 依赖
        document.addEventListener('DOMContentLoaded', () => {
            const t = localStorage.getItem('pudding_token');
            const u = localStorage.getItem('pudding_user');

            if (!t || !u) { 
                showNotify("凭证失效，正在强制撤离...", "error");
                setTimeout(() => { window.location.href = "/"; }, 1000);
                return; 
            }

            // 立即渲染 UI
            document.getElementById('userTag').innerText = u.toUpperCase() + "_SCANNER";

            // 快速解密解锁
            setTimeout(() => {
                document.getElementById('lockscreen').style.opacity = '0';
                setTimeout(() => document.getElementById('lockscreen').style.display = 'none', 400); 
                showNotify("雷达监听站已上线，欢迎特工。", "success");
            }, 300);
        });

        document.getElementById('radarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); 
            btn.innerText = "信号解析中..."; 
            btn.disabled = true;
            showNotify("正在发射探测波束，连接 DeepSeek 引擎...", "info");
            
            try {
                const res = await fetch(RADAR_API, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('pudding_token')}` }, 
                    body: JSON.stringify({ 
                        email: localStorage.getItem('pudding_email'),
                        username: localStorage.getItem('pudding_user'),
                        location: document.getElementById('location').value, 
                        assets: document.getElementById('assets').value, 
                        niche: document.getElementById('niche').value 
                    }) 
                });
                
                if (res.status === 401) {
                    showNotify("身份验证过期，请重新登录", "error");
                    setTimeout(() => { localStorage.clear(); window.location.href = "/"; }, 1500);
                    return;
                }

                const data = await res.json();
                if (data.status === "error") {
                    showNotify(data.message, "error");
                    return; 
                }

                const outputText = data.blueprint || data.report;
                if (outputText) {
                    document.getElementById('blueprintContent').innerHTML = marked.parse(outputText);
                    document.getElementById('posterContent').innerHTML = marked.parse(outputText);
                    document.getElementById('resultArea').classList.remove('hidden');
                    showNotify("全球套利情报捕获成功！", "success");
                    setTimeout(() => { document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' }); }, 100);
                }
            } catch (err) { 
                showNotify("雷达信号中断，请检查 NAS 连接", "error");
            } finally { 
                btn.innerText = "启动雷达 · 扫描全球套利空间"; 
                btn.disabled = false; 
            }
        });

        async function generatePoster() {
            const btn = document.getElementById('posterBtn');
            const wrap = document.getElementById('posterWrapper'); 
            btn.innerText = "渲染中...";
            wrap.style.display = 'block';
            try {
                const canvas = await html2canvas(wrap, { backgroundColor: "#050a15", scale: 2, useCORS: true });
                const link = document.createElement('a'); 
                link.download = `Radar_Intel_${Date.now()}.png`; 
                link.href = canvas.toDataURL('image/png'); 
                link.click();
                showNotify("情报海报导出成功！", "success");
            } catch(e) {
                showNotify("海报生成失败", "error");
            } finally {
                wrap.style.display = 'none';
                btn.innerText = "↓ 导出情报海报";
            }
        }
    </script>
</body>
</html>
