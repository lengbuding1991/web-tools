<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>套利雷达 - 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --radar-green: #10b981; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); color: #94a3b8; font-family: 'Inter', sans-serif; overflow: hidden; }
        .tech-grid { background-image: radial-gradient(rgba(16, 185, 129, 0.1) 1px, transparent 0); background-size: 30px 30px; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(16, 185, 129, 0.2); }
        #lockscreen { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; flex-direction: column; items-center; justify-center; }
        .glitch-red { color: #ef4444; font-weight: 800; animation: glitch 0.3s infinite; text-transform: uppercase; letter-spacing: 0.5em; }
        @keyframes glitch { 0% { transform: translate(2px, 0); } 50% { transform: translate(-2px, 0); } 100% { transform: translate(0, 0); } }
        .scanning-beam { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, var(--radar-green), transparent); box-shadow: 0 0 20px var(--radar-green); animation: radar-move 6s infinite linear; z-index: 100; opacity: 0.15; pointer-events: none; }
        @keyframes radar-move { 0% { top: -5%; } 100% { top: 105%; } }
        .prose h2 { color: #fff !important; border-left: 4px solid var(--radar-green); padding-left: 1rem; }
    </style>
</head>
<body class="tech-grid min-h-screen flex flex-col md:flex-row">
    <div id="lockscreen" class="hidden">
        <div class="mono text-[10px] text-emerald-500 mb-4 tracking-[1em]">RADAR_AUTH_GUARD</div>
        <div class="glitch-red text-2xl mb-8">Unauthorized Access</div>
        <div class="w-64 h-1 bg-white/5 rounded-full overflow-hidden"><div id="lock-progress" class="h-full bg-emerald-600 transition-all duration-1000" style="width: 0%"></div></div>
    </div>
    <script>
        (function() { if (!localStorage.getItem('pudding_token')) { document.getElementById('lockscreen').classList.remove('hidden'); setTimeout(() => { document.getElementById('lock-progress').style.width = "100%"; }, 100); setTimeout(() => { window.location.href = "/"; }, 2500); } })();
    </script>
    <div class="scanning-beam"></div>

    <aside class="w-full md:w-80 p-6 flex flex-col gap-6 shrink-0 glass border-r border-emerald-500/20">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center font-bold text-white text-xl">02</div>
            <h2 class="font-black text-white text-lg">套利雷达</h2>
        </div>
        <form id="radarForm" class="space-y-5">
            <input type="text" id="location" required placeholder="当前坐标" class="w-full px-5 py-4 rounded-xl text-sm bg-slate-900 border border-emerald-500/20 text-white outline-none">
            <input type="text" id="assets" required placeholder="可用资产" class="w-full px-5 py-4 rounded-xl text-sm bg-slate-900 border border-emerald-500/20 text-white outline-none">
            <button type="submit" id="submitBtn" class="w-full py-5 bg-emerald-600 text-white font-black rounded-2xl text-xs uppercase tracking-[0.3em]">激活扫描指令</button>
        </form>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 flex items-center justify-between px-8 border-b border-white/5">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Global Arbitrage Scan</span>
            <a href="/" class="px-4 py-1.5 glass rounded-full text-xs hover:text-white transition-colors">退出终端</a>
        </header>
        <div id="resultArea" class="hidden flex-1 overflow-y-auto p-12">
            <div id="radarContent" class="prose prose-invert prose-emerald max-w-4xl mx-auto text-slate-300"></div>
        </div>
    </main>

    <script>
        const API_URL = "https://nas-n8n.lbuding.com/webhook/radar-engine";
        document.getElementById('radarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = "波束锁定中...";
            const vid = (await (await FingerprintJS.load()).get()).visitorId;
            const res = await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('pudding_token')}`}, body: JSON.stringify({ visitor_id: vid, location: document.getElementById('location').value, assets: document.getElementById('assets').value, niche: "Radar Scan" })});
            if(res.status === 401) { location.reload(); return; }
            const data = await res.json();
            if(data.blueprint || data.output) { document.getElementById('radarContent').innerHTML = marked.parse(data.blueprint || data.output); document.getElementById('resultArea').classList.remove('hidden'); }
            btn.disabled = false; btn.innerText = "激活扫描指令";
        });
    </script>
</body>
</html>
