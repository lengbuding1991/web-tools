<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD 卡片生成器 Pro - 不打工的布丁</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a; 
            --panel-bg: #111827;
            --accent: #a78bfa; 
            --export-width: 450px; 
        }
        
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-color); color: #fff; display: flex; height: 100vh; overflow: hidden; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .config-panel { flex: none; width: 100%; border-right: none; border-bottom: 1px solid #334155; }
            .preview-container { padding: 40px 10px; min-height: 100vh; background-color: #1e293b; }
            .card-wrapper:not(.is-capturing) { width: 92vw !important; margin: 0 auto; } 
        }

        @media (min-width: 769px) {
            .config-panel { flex: 0 0 350px; }
            .card-wrapper { width: var(--export-width); }
            .preview-container { flex: 1; padding: 60px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        }
        
        /* 配置面板 */
        .config-panel { padding: 25px; display: flex; flex-direction: column; border-right: 1px solid #334155; overflow-y: auto; background-color: var(--panel-bg); box-sizing: border-box; }
        .config-group { margin-bottom: 20px; }
        .config-group label { display: block; color: #94a3b8; font-size: 13px; margin-bottom: 8px; font-weight: bold; }
        .config-group input, .config-group textarea { width: 100%; background-color: #020617; color: #fff; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 14px; box-sizing: border-box; outline: none; }
        .config-group textarea { height: 120px; resize: vertical; }

        /* 卡片主体样式 */
        .card-wrapper { 
            background: #ffffff; 
            border-radius: 32px; 
            padding: 40px; 
            box-sizing: border-box; 
            position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            color: #1f2937;
            word-wrap: break-word;
            border: 1px solid #e5e7eb;
        }

        /* 截图专用状态：消除上下左右一切溢出 */
        .card-wrapper.is-capturing {
            box-shadow: none !important;
            margin: 0 !important;
            border: 1px solid #e5e7eb !important;
            transform: none !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
        }

        .card-header { display: flex; align-items: center; margin-bottom: 30px; }
        .avatar { width: 60px; height: 60px; border-radius: 16px; margin-right: 18px; object-fit: cover; background-color: #374151; }
        .author-info h3 { margin: 0; font-size: 22px; font-weight: 700; color: #000; }
        .author-info p { margin: 4px 0 0; font-size: 14px; color: #6b7280; }

        .markdown-body { line-height: 1.8; font-size: 16px; color: #374151;}
        .markdown-body h3 { margin: 25px 0 15px; font-size: 20px; font-weight: 700; color: #000; display: flex; align-items: center; }
        .markdown-body h3::after { content:''; flex: 1; height: 1px; background-color: #e5e7eb; margin-left: 10px;}
        .markdown-body ul { padding-left: 20px; list-style: none; }
        .markdown-body li { position: relative; margin-bottom: 8px; }
        .markdown-body li::before { content: "•"; color: #000; font-weight: bold; position: absolute; left: -15px; }
        .markdown-body blockquote { border-left: 4px solid var(--accent); margin: 20px 0; padding: 10px 20px; color: #9ca3af; font-style: italic; background: #f9fafb; border-radius: 4px; }
        
        .card-footer { margin-top: 40px; text-align: center; font-size: 13px; color: #9ca3af; font-family: monospace; }

        .save-btn { margin-top: 30px; width: 100%; max-width: 400px; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: block;}
    </style>
</head>
<body>

    <div class="config-panel">
        <h2 style="margin: 0 0 20px 0; font-size: 18px;">🎛️ 卡片配置</h2>
        <div class="config-group">
            <label>1. 上传头像</label>
            <input type="file" id="avatar-input" accept="image/*">
        </div>
        <div class="config-group">
            <label>2. 信息设置</label>
            <input type="text" id="name-input" value="不打工的布丁" style="margin-bottom: 10px;">
            <input type="text" id="desc-input" value="@Code & Life | 数字主理人">
        </div>
        <div class="config-group">
            <label>3. Markdown 内容</label>
            <textarea id="md-input">### 🚀 2026 计划

* **核心**：独立开发
* **工具**：Cursor + AI
* **愿景**：代码驱动生活

> “Stay hungry, stay foolish.”</textarea>
        </div>
    </div>

    <div class="preview-container">
        <div class="card-wrapper" id="capture-area">
            <div class="card-header">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA0OCA0OCI+PHJlY3Qgd2lkdGg9IjQ4IiBoZWlnaHQ9IjQ4IiByeD0iMjQiIGZpbGw9IiMzNzQxNTEiLz48cGF0aCBkPSJNMjQgMTJjLTMuMzEgMC02IDIuNjktNiA2czIuNjkgNiA2IDYgNi0yLjY5IDYtNi0yLjY5LTYtNi02em0wIDIyYy00Ljk3IDAtOS0yLjA2LTktNC42OXYtMS42MWMwLTIuNjMgNC4wMy00LjY5IDktNC42OXM5IDIuMDYgOSA0LjY5djEuNjFjMCAyLjYzLTQuMDMgNC42OS05IDQuNjl6IiBmaWxsPSIjOWRhM2I4Ii8+PC9zdmc+" class="avatar" id="p-avatar">
                <div class="author-info">
                    <h3 id="p-name">不打工的布丁</h3>
                    <p id="p-desc">@Code & Life | 数字主理人</p>
                </div>
            </div>
            <div class="markdown-body" id="p-markdown"></div>
            <div class="card-footer">tools.lbuding.com</div>
        </div>
        <button class="save-btn" id="save-btn">⬇️ 保存精确裁剪图片</button>
    </div>

    <script>
        const avatarInput = document.getElementById('avatar-input');
        const nameInput = document.getElementById('name-input');
        const descInput = document.getElementById('desc-input');
        const mdInput = document.getElementById('md-input');
        const pAvatar = document.getElementById('p-avatar');
        const pName = document.getElementById('p-name');
        const pDesc = document.getElementById('p-desc');
        const pMarkdown = document.getElementById('p-markdown');
        const saveBtn = document.getElementById('save-btn');
        const captureArea = document.getElementById('capture-area');

        const updatePreview = () => {
            pName.innerText = nameInput.value;
            pDesc.innerText = descInput.value;
            pMarkdown.innerHTML = marked.parse(mdInput.value);
        };
        [nameInput, descInput, mdInput].forEach(el => el.addEventListener('input', updatePreview));
        updatePreview();

        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => pAvatar.src = ev.target.result;
                reader.readAsDataURL(file);
            }
        });

        // ==================== 终极裁剪修正 ====================
        saveBtn.addEventListener('click', async () => {
            saveBtn.innerText = "⏳ 正在导出...";
            saveBtn.disabled = true;

            const exportWidth = 450; 
            const originalStyle = captureArea.style.cssText;

            // 1. 进入截图模式
            captureArea.classList.add('is-capturing');
            captureArea.style.width = exportWidth + 'px';

            try {
                const canvas = await html2canvas(captureArea, {
                    width: exportWidth,
                    height: captureArea.offsetHeight, // 动态计算卡片实际高度
                    scale: 2,
                    useCORS: true,
                    backgroundColor: null,
                    // 强制从(0,0)坐标开始抓取，不考虑滚动条位置
                    x: 0,
                    y: 0,
                    scrollX: 0,
                    scrollY: 0,
                    onclone: (clonedDoc) => {
                        const target = clonedDoc.getElementById('capture-area');
                        target.style.position = 'absolute';
                        target.style.top = '0';
                        target.style.left = '0';
                        target.style.margin = '0';
                    }
                });

                const link = document.createElement('a');
                link.download = `Card_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error(err);
            } finally {
                captureArea.classList.remove('is-capturing');
                captureArea.style.cssText = originalStyle;
                saveBtn.innerText = "⬇️ 保存精确裁剪图片";
                saveBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
