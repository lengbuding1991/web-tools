<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD 卡片生成器 Pro - 不打工的布丁</title>
	<link rel="icon" type="image/x-icon" href="/favicon.ico">
    <script src="./js/marked.min.js"></script>
    <script src="./js/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #020617; 
            --panel-bg: #111827;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #a78bfa; 
            --card-width: 400px;
        }
        
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* 左侧配置面板 */
        .config-panel { flex: 0 0 320px; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #334155; overflow-y: auto; background-color: var(--panel-bg); }
        .config-group { margin-bottom: 20px; }
        .config-group label { display: block; color: var(--text-muted); font-size: 13px; margin-bottom: 8px; font-weight: bold; }
        .config-group input[type="text"], .config-group textarea, .config-group select { width: 100%; background-color: #020617; color: var(--text-main); border: 1px solid #334155; border-radius: 8px; padding: 10px; font-size: 14px; box-sizing: border-box; outline: none; }
        .config-group input:focus, .config-group textarea:focus { border-color: var(--accent); }
        .config-group textarea { height: 150px; resize: none; font-family: monospace; }
        
        /* 风格切换按钮组 */
        .style-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .style-btn { background: #1e293b; border: 1px solid #334155; color: var(--text-muted); padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .style-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 自定义文件上传按钮 */
        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .btn-upload { border: 1px dashed #4b5563; color: var(--text-muted); background-color: #020617; padding: 10px; border-radius: 8px; width: 100%; text-align: center; cursor: pointer; font-size: 14px; box-sizing: border-box; display: block; }
        .btn-upload:hover { border-color: var(--accent); color: var(--accent); }
        .file-upload-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }

        /* 右侧预览区 */
        .preview-container { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #0b1120; overflow-y: auto; }
        
        /* ==================== 样式引擎核心 ==================== */
        
        /* 基础卡片容器 */
        .card-wrapper { 
            width: var(--card-width); 
            border-radius: 24px; 
            padding: 35px; 
            box-sizing: border-box; 
            position: relative; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 风格 1：赛博霓虹 (Cyber) */
        .theme-cyber {
            background: linear-gradient(165deg, #1e293b 0%, #0f172a 100%); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); 
            border: 1px solid rgba(167, 139, 250, 0.2); 
        }
        .theme-cyber::before {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 60px; height: 3px; background: #a78bfa; box-shadow: 0 0 15px #a78bfa; border-radius: 0 0 4px 4px;
        }
        .theme-cyber .markdown-body h3 { color: #ffffff; text-shadow: 0 0 10px rgba(167, 139, 250, 0.5); border-bottom: 1px solid rgba(167, 139, 250, 0.2); }
        .theme-cyber .avatar { border: 1px solid rgba(167, 139, 250, 0.3); border-radius: 14px; }
        .theme-cyber .author-info p { color: #a78bfa; }

        /* 风格 2：极简纸张 (Light) */
        .theme-light {
            background: #ffffff; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); 
            border: 1px solid #e5e7eb; 
        }
        .theme-light .author-info h3 { color: #111827; }
        .theme-light .author-info p { color: #6b7280; }
        .theme-light .markdown-body { color: #374151; }
        .theme-light .markdown-body h3 { color: #111827; border-bottom: 2px solid #f3f4f6; text-shadow: none; }
        .theme-light .avatar { border: 2px solid #f3f4f6; border-radius: 50%; }
        .theme-light .card-header { border-bottom: 1px solid #f3f4f6; }
        .theme-light .markdown-body blockquote { background: #f9fafb; border-left-color: #d1d5db; color: #6b7280; }
        .theme-light .markdown-body li::before { content: "•"; color: #3b82f6; }

        /* 风格 3：深海渐变 (Sea) */
        .theme-sea {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(56, 189, 248, 0.2); 
        }
        .theme-sea::after {
            content: ''; position: absolute; bottom: 20px; right: 20px; width: 40px; height: 40px; 
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%);
        }
        .theme-sea .author-info p { color: #38bdf8; }
        .theme-sea .markdown-body h3 { color: #f0f9ff; text-shadow: 0 0 8px rgba(56, 189, 248, 0.4); border-bottom: 1px solid rgba(56, 189, 248, 0.2); }
        .theme-sea .markdown-body blockquote { background: rgba(56, 189, 248, 0.05); border-left-color: #38bdf8; }

        /* 共通组件样式 */
        .card-header { display: flex; align-items: center; margin-bottom: 30px; padding-bottom: 20px; }
        .avatar { width: 52px; height: 52px; margin-right: 18px; object-fit: cover; background-color: #374151; }
        .author-info h3 { margin: 0; font-size: 19px; letter-spacing: 0.5px; }
        .author-info p { margin: 6px 0 0 0; font-size: 12px; opacity: 0.8; letter-spacing: 1px; }
        .markdown-body { line-height: 1.8; font-size: 15px; }
        .markdown-body h3 { font-size: 20px; margin-top: 25px; margin-bottom: 15px; display: block; padding-bottom: 5px; }
        .markdown-body blockquote { margin: 20px 0; padding: 12px 20px; font-style: italic; border-radius: 0 12px 12px 0; }
        .markdown-body ul { list-style: none; padding-left: 5px; }
        .markdown-body li::before { margin-right: 10px; font-size: 12px; }
        .theme-cyber li::before, .theme-sea li::before { content: "◈"; color: var(--accent); }
        .card-footer { margin-top: 40px; text-align: center; font-size: 11px; color: #64748b; font-family: monospace; letter-spacing: 2px; }

        .save-btn { margin-top: 30px; width: 100%; max-width: var(--card-width); padding: 16px; background-color: var(--accent); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }
        .save-btn:hover { background-color: #7c3aed; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="config-panel">
        <h2 style="margin-top: 0; margin-bottom: 20px; font-size: 20px;">🎛️ 卡片配置</h2>
        
        <div class="config-group">
            <label>卡片风格切换</label>
            <div class="style-selector">
                <button class="style-btn active" data-theme="theme-cyber">赛博霓虹</button>
                <button class="style-btn" data-theme="theme-light">极简纸张</button>
                <button class="style-btn" data-theme="theme-sea">深海渐变</button>
            </div>
        </div>

        <div class="config-group">
            <label>1. 上传自定义头像</label>
            <div class="file-upload-wrapper">
                <div class="btn-upload" id="file-name-display">点击上传图片</div>
                <input type="file" id="avatar-input" accept="image/*">
            </div>
        </div>

        <div class="config-group">
            <label>2. 修改主理人昵称</label>
            <input type="text" id="name-input" value="不打工的布丁">
        </div>
        <div class="config-group">
            <label>3. 修改主理人签名</label>
            <input type="text" id="desc-input" value="@Code & Life | 数字主理人">
        </div>

        <div class="config-group" style="flex: 1; display: flex; flex-direction: column;">
            <label>4. Markdown 内容输入</label>
            <textarea id="md-input" style="flex: 1;">
### 🚀 2026 一人 AI 公司计划

放弃了传统的职场内耗，正式开启**独立开发**之旅。

* **核心驱动**：自动化流水线 + 大模型
* **知识管理**：构建个人 Markdown 知识库
* **终极目标**：打造数字资产，实现真正的自由。

> “底气不是别人给的，是系统和代码给的。”
            </textarea>
        </div>
    </div>

    <div class="preview-container">
        <div class="card-wrapper theme-cyber" id="capture-area">
            <div class="card-header">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA0OCA0OCI+PHJlY3Qgd2lkdGg9IjQ4IiBoZWlnaHQ9IjQ4IiByeD0iMjQiIGZpbGw9IiMzNzQxNTEiLz48cGF0aCBkPSJNMjQgMTJjLTMuMzEgMC02IDIuNjktNiA2czIuNjkgNiA2IDYgNi0yLjY5IDYtNi0yLjY5LTYtNi02em0wIDIyYy00Ljk3IDAtOS0yLjA2LTktNC42OXYtMS42MWMwLTIuNjMgNC4wMy00LjY5IDktNC42OXM5IDIuMDYgOSA0LjY5djEuNjFjMCAyLjYzLTQuMDMgNC42OS05IDQuNjl6IiBmaWxsPSIjOWRhM2I4Ii8+PC9zdmc+" alt="avatar" class="avatar" id="p-avatar">
                <div class="author-info">
                    <h3 id="p-name">不打工的布丁</h3>
                    <p id="p-desc">@Code & Life | 数字主理人</p>
                </div>
            </div>
            
            <div class="markdown-body" id="p-markdown"></div>
            
            <div class="card-footer">tools.lbuding.com</div>
        </div>

        <button class="save-btn" id="save-btn">⬇️ 保存为高清图片</button>
    </div>

    <script>
        const avatarInput = document.getElementById('avatar-input');
        const nameInput = document.getElementById('name-input');
        const descInput = document.getElementById('desc-input');
        const mdInput = document.getElementById('md-input');
        const fileNameDisplay = document.getElementById('file-name-display');
        const pAvatar = document.getElementById('p-avatar');
        const pName = document.getElementById('p-name');
        const pDesc = document.getElementById('p-desc');
        const pMarkdown = document.getElementById('p-markdown');
        const saveBtn = document.getElementById('save-btn');
        const captureArea = document.getElementById('capture-area');
        const styleBtns = document.querySelectorAll('.style-btn');

        // 风格切换逻辑
        styleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 移除旧激活状态
                styleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // 切换主题类
                const theme = btn.getAttribute('data-theme');
                captureArea.className = `card-wrapper ${theme}`;
            });
        });

        // 图片处理
        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            fileNameDisplay.innerText = file.name;
            const reader = new FileReader();
            reader.onload = (event) => pAvatar.src = event.target.result;
            reader.readAsDataURL(file);
        });

        // 预览处理
        nameInput.addEventListener('input', () => pName.innerText = nameInput.value);
        descInput.addEventListener('input', () => pDesc.innerText = descInput.value);
        function updateMarkdownPreview() { pMarkdown.innerHTML = marked.parse(mdInput.value); }
        mdInput.addEventListener('input', updateMarkdownPreview);
        updateMarkdownPreview();

        // 截图保存
        saveBtn.addEventListener('click', () => {
            saveBtn.innerText = "⏳ 正在生成...";
            saveBtn.style.opacity = "0.7";
            html2canvas(captureArea, {
                scale: 3,
                backgroundColor: null,
                logging: false,
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `布丁笔记_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                saveBtn.innerText = "⬇️ 保存为高清图片";
                saveBtn.style.opacity = "1";
            });
        });
    </script>
</body>
</html>
