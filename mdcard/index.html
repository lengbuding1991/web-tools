<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD 卡片生成器 Pro - 不打工的布丁</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #020617; 
            --panel-bg: #111827;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #a78bfa; 
            --export-width: 400px; 
        }
        
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .config-panel { flex: none; width: 100%; border-right: none; border-bottom: 1px solid #334155; }
            .preview-container { padding: 40px 10px; min-height: 100vh; background-color: #0b1120; }
            .card-wrapper:not(.is-capturing) { width: 92vw !important; margin: 0 auto; } 
        }

        @media (min-width: 769px) {
            .config-panel { flex: 0 0 350px; }
            .preview-container { flex: 1; padding: 60px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; background-color: #0b1120;}
        }
        
        .config-panel { padding: 25px; display: flex; flex-direction: column; border-right: 1px solid #334155; overflow-y: auto; background-color: var(--panel-bg); box-sizing: border-box; }
        .config-group { margin-bottom: 20px; }
        .config-group label { display: block; color: var(--text-muted); font-size: 13px; margin-bottom: 8px; font-weight: bold; }
        .config-group input, .config-group textarea { width: 100%; background-color: #020617; color: var(--text-main); border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 14px; box-sizing: border-box; outline: none; }
        .config-group textarea { height: 150px; resize: vertical; font-family: monospace; }

        .style-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .style-btn { background: #1e293b; border: 1px solid #334155; color: var(--text-muted); padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .style-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 卡片基础样式 */
        .card-wrapper { 
            width: var(--export-width); 
            border-radius: 24px; 
            padding: 35px; 
            box-sizing: border-box; 
            position: relative; 
            overflow: hidden; /* 核心：防止子元素溢出 */
            background: #fff;
        }

        /* 截图专用：强制重置所有可能导致透明的属性 */
        .card-wrapper.is-capturing {
            box-shadow: none !important;
            margin: 0 !important;
            transform: none !important;
            border: none !important; /* 如果有边框也会被计入，先关掉或统一 */
        }

        /* 风格定义 */
        .theme-cyber { background: linear-gradient(165deg, #1e293b 0%, #0f172a 100%); color: #fff; border: 1px solid rgba(167, 139, 250, 0.2); }
        .theme-cyber::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 3px; background: #a78bfa; }
        .theme-cyber .author-info p { color: #a78bfa; }

        .theme-light { background: #ffffff; color: #374151; border: 1px solid #e5e7eb; }
        .theme-light .author-info h3 { color: #111827; }
        .theme-light .author-info p { color: #6b7280; }

        .theme-sea { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); color: #fff; }
        .theme-sea .author-info p { color: #38bdf8; }

        .card-header { display: flex; align-items: center; margin-bottom: 25px; }
        .avatar { width: 52px; height: 52px; margin-right: 18px; border-radius: 14px; object-fit: cover; background: #334155; }
        .author-info h3 { margin: 0; font-size: 19px; }
        .author-info p { margin: 4px 0 0; font-size: 12px; opacity: 0.8; }
        
        .markdown-body { line-height: 1.8; font-size: 15px; }
        .markdown-body h3 { font-size: 20px; margin: 25px 0 15px; border-bottom: 1px solid rgba(128,128,128,0.2); }
        .markdown-body blockquote { border-left: 4px solid var(--accent); padding: 10px 20px; background: rgba(128,128,128,0.05); margin: 20px 0; }
        
        .card-footer { margin-top: 40px; text-align: center; font-size: 11px; opacity: 0.5; font-family: monospace; }

        .save-btn { margin-top: 30px; width: 100%; max-width: 400px; padding: 16px; background-color: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: block; }
    </style>
</head>
<body>

    <div class="config-panel">
        <h2 style="margin: 0 0 20px 0; font-size: 18px;">🎛️ 卡片配置</h2>
        <div class="config-group">
            <label>风格切换</label>
            <div class="style-selector">
                <button class="style-btn active" data-theme="theme-cyber">赛博霓虹</button>
                <button class="style-btn" data-theme="theme-light">极简纸张</button>
                <button class="style-btn" data-theme="theme-sea">深海渐变</button>
            </div>
        </div>
        <div class="config-group">
            <label>1. 上传头像</label>
            <input type="file" id="avatar-input" accept="image/*">
        </div>
        <div class="config-group">
            <label>2. 昵称 / 签名</label>
            <input type="text" id="name-input" value="不打工的布丁" style="margin-bottom: 10px;">
            <input type="text" id="desc-input" value="@Code & Life | 数字主理人">
        </div>
        <div class="config-group">
            <label>3. 内容内容</label>
            <textarea id="md-input">### 🚀 2026 计划

* **核心**：独立开发
* **工具**：Cursor + AI
* **愿景**：代码驱动生活

> “Stay hungry, stay foolish.”</textarea>
        </div>
    </div>

    <div class="preview-container">
        <div class="card-wrapper theme-cyber" id="capture-area">
            <div class="card-header">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA0OCA0OCI+PHJlY3Qgd2lkdGg9IjQ4IiBoZWlnaHQ9IjQ4IiByeD0iMjQiIGZpbGw9IiMzNzQxNTEiLz48cGF0aCBkPSJNMjQgMTJjLTMuMzEgMC02IDIuNjktNiA2czIuNjkgNiA2IDYgNi0yLjY5IDYtNi0yLjY5LTYtNi02em0wIDIyYy00Ljk3IDAtOS0yLjA2LTktNC42OXYtMS42MWMwLTIuNjMgNC4wMy00LjY5IDktNC42OXM5IDIuMDYgOSA0LjY5djEuNjFjMCAyLjYzLTQuMDMgNC42OS05IDQuNjl6IiBmaWxsPSIjOWRhM2I4Ii8+PC9zdmc+" class="avatar" id="p-avatar">
                <div class="author-info">
                    <h3 id="p-name">不打工的布丁</h3>
                    <p id="p-desc">@Code & Life | 数字主理人</p>
                </div>
            </div>
            <div class="markdown-body" id="p-markdown"></div>
            <div class="card-footer">tools.lbuding.com</div>
        </div>
        <button class="save-btn" id="save-btn">⬇️ 保存精确裁剪图片</button>
    </div>

    <script>
        const avatarInput = document.getElementById('avatar-input');
        const nameInput = document.getElementById('name-input');
        const descInput = document.getElementById('desc-input');
        const mdInput = document.getElementById('md-input');
        const pAvatar = document.getElementById('p-avatar');
        const pName = document.getElementById('p-name');
        const pDesc = document.getElementById('p-desc');
        const pMarkdown = document.getElementById('p-markdown');
        const saveBtn = document.getElementById('save-btn');
        const captureArea = document.getElementById('capture-area');
        const styleBtns = document.querySelectorAll('.style-btn');

        styleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                styleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                captureArea.className = `card-wrapper ${btn.getAttribute('data-theme')}`;
            });
        });

        const updatePreview = () => {
            pName.innerText = nameInput.value;
            pDesc.innerText = descInput.value;
            pMarkdown.innerHTML = marked.parse(mdInput.value);
        };
        [nameInput, descInput, mdInput].forEach(el => el.addEventListener('input', updatePreview));
        updatePreview();

        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => pAvatar.src = ev.target.result;
                reader.readAsDataURL(file);
            }
        });

        // ==================== 终极裁剪修正 (四向零边距) ====================
        saveBtn.addEventListener('click', async () => {
            saveBtn.innerText = "⏳ 正在导出...";
            saveBtn.disabled = true;

            // 1. 记录状态
            const originalStyle = captureArea.style.cssText;
            
            // 2. 关键：截图前先精准测量元素的真实尺寸
            const rect = captureArea.getBoundingClientRect();
            
            // 3. 强制进入导出状态
            captureArea.classList.add('is-capturing');
            captureArea.style.width = '400px'; // 锁定宽度
            captureArea.style.margin = '0';
            captureArea.style.padding = '35px'; // 确保Padding固定

            try {
                const canvas = await html2canvas(captureArea, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: null,
                    // 核心参数：根据 getBoundingClientRect 精确指定裁剪区域
                    width: 400,
                    height: captureArea.scrollHeight, // 使用 scrollHeight 抓取包括溢出的完整高度
                    x: 0,
                    y: 0,
                    scrollX: 0,
                    scrollY: 0,
                    onclone: (clonedDoc) => {
                        const target = clonedDoc.getElementById('capture-area');
                        // 在克隆页面里彻底移除干扰，并强行将其放置在原点
                        target.style.position = 'fixed';
                        target.style.top = '0';
                        target.style.left = '0';
                        target.style.margin = '0';
                        target.style.boxShadow = 'none';
                    }
                });

                const link = document.createElement('a');
                link.download = `Card_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error(err);
            } finally {
                captureArea.classList.remove('is-capturing');
                captureArea.style.cssText = originalStyle;
                saveBtn.innerText = "⬇️ 保存精确裁剪图片";
                saveBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
