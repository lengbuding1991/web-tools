<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD 卡片生成器 Pro - 不打工的布丁</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #020617; 
            --panel-bg: #111827;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #a78bfa; 
            --card-width: 400px;
        }
        
        /* 基础布局优化 */
        body { 
            margin: 0; 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* 响应式调整：手机端堆叠显示 */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .config-panel { flex: none !important; width: 100%; border-right: none !important; border-bottom: 1px solid #334155; }
            .preview-container { padding: 40px 10px !important; min-height: 500px; }
            :root { --card-width: 95vw; }
        }
        
        /* 左侧配置面板 */
        .config-panel { flex: 0 0 320px; padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #334155; overflow-y: auto; background-color: var(--panel-bg); box-sizing: border-box; }
        .config-group { margin-bottom: 20px; }
        .config-group label { display: block; color: var(--text-muted); font-size: 13px; margin-bottom: 8px; font-weight: bold; }
        .config-group input[type="text"], .config-group textarea, .config-group select { width: 100%; background-color: #020617; color: var(--text-main); border: 1px solid #334155; border-radius: 8px; padding: 10px; font-size: 14px; box-sizing: border-box; outline: none; }
        .config-group textarea { height: 120px; resize: vertical; font-family: monospace; }
        
        /* 风格切换按钮 */
        .style-selector { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .style-btn { background: #1e293b; border: 1px solid #334155; color: var(--text-muted); padding: 10px 5px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .style-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 上传按钮 */
        .btn-upload { border: 1px dashed #4b5563; color: var(--text-muted); background-color: #020617; padding: 12px; border-radius: 8px; width: 100%; text-align: center; cursor: pointer; font-size: 14px; box-sizing: border-box; display: block; }

        /* 右侧预览区 */
        .preview-container { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; background-color: #0b1120; overflow-y: auto; position: relative; }
        
        /* 卡片容器 */
        .card-wrapper { 
            width: var(--card-width); 
            min-height: 300px;
            border-radius: 24px; 
            padding: 30px; 
            box-sizing: border-box; 
            position: relative; 
            word-wrap: break-word; /* 防止长单词撑破卡片 */
        }

        /* 风格代码保持不变，仅优化间距 */
        .theme-cyber { background: linear-gradient(165deg, #1e293b 0%, #0f172a 100%); border: 1px solid rgba(167, 139, 250, 0.2); }
        .theme-light { background: #ffffff; border: 1px solid #e5e7eb; }
        .theme-sea { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); border: 1px solid rgba(56, 189, 248, 0.2); }

        .card-header { display: flex; align-items: center; margin-bottom: 20px; }
        .avatar { width: 48px; height: 48px; margin-right: 15px; border-radius: 12px; object-fit: cover; }
        .author-info h3 { margin: 0; font-size: 17px; }
        .author-info p { margin: 4px 0 0 0; font-size: 12px; }

        .markdown-body { line-height: 1.6; font-size: 15px; }
        .markdown-body h3 { font-size: 18px; margin: 20px 0 10px 0; }
        .markdown-body blockquote { margin: 15px 0; padding: 10px 15px; border-left: 4px solid var(--accent); background: rgba(255,255,255,0.05); border-radius: 4px; }
        
        .card-footer { margin-top: 30px; text-align: center; font-size: 10px; color: #64748b; opacity: 0.6; }

        .save-btn { margin: 25px 0; width: 100%; max-width: var(--card-width); padding: 16px; background-color: var(--accent); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body>

    <div class="config-panel">
        <h2 style="margin-top: 0; margin-bottom: 20px; font-size: 18px;">🎛️ 卡片配置</h2>
        
        <div class="config-group">
            <label>风格选择</label>
            <div class="style-selector">
                <button class="style-btn active" data-theme="theme-cyber">赛博</button>
                <button class="style-btn" data-theme="theme-light">极简</button>
                <button class="style-btn" data-theme="theme-sea">深海</button>
            </div>
        </div>

        <div class="config-group">
            <label>1. 头像上传</label>
            <label class="btn-upload" for="avatar-input" id="file-name-display">选择图片</label>
            <input type="file" id="avatar-input" accept="image/*" style="display:none">
        </div>

        <div class="config-group">
            <label>2. 昵称 / 签名</label>
            <input type="text" id="name-input" value="不打工的布丁" style="margin-bottom: 8px;">
            <input type="text" id="desc-input" value="@Code & Life | 数字主理人">
        </div>

        <div class="config-group">
            <label>3. Markdown 内容</label>
            <textarea id="md-input">
### 🚀 2026 一人 AI 公司计划

放弃了内耗，正式开启**独立开发**之旅。

* **核心**：自动化 + 大模型
* **目标**：打造数字资产。

> “底气是代码给的。”</textarea>
        </div>
    </div>

    <div class="preview-container">
        <div class="card-wrapper theme-cyber" id="capture-area">
            <div class="card-header">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA0OCA0OCI+PHJlY3Qgd2lkdGg9IjQ4IiBoZWlnaHQ9IjQ4IiByeD0iMjQiIGZpbGw9IiMzNzQxNTEiLz48cGF0aCBkPSJNMjQgMTJjLTMuMzEgMC02IDIuNjktNiA2czIuNjkgNiA2IDYgNi0yLjY5IDYtNi0yLjY5LTYtNi02em0wIDIyYy00Ljk3IDAtOS0yLjA2LTktNC42OXYtMS42MWMwLTIuNjMgNC4wMy00LjY5IDktNC42OXM5IDIuMDYgOSA0LjY5djEuNjFjMCAyLjYzLTQuMDMgNC42OS05IDQuNjl6IiBmaWxsPSIjOWRhM2I4Ii8+PC9zdmc+" alt="avatar" class="avatar" id="p-avatar">
                <div class="author-info">
                    <h3 id="p-name">不打工的布丁</h3>
                    <p id="p-desc">@Code & Life | 数字主理人</p>
                </div>
            </div>
            <div class="markdown-body" id="p-markdown"></div>
            <div class="card-footer">tools.lbuding.com</div>
        </div>
        <button class="save-btn" id="save-btn">⬇️ 保存为高清图片</button>
    </div>

    <script>
        // 脚本逻辑保持原样，仅做少量兼容性检查
        const avatarInput = document.getElementById('avatar-input');
        const nameInput = document.getElementById('name-input');
        const descInput = document.getElementById('desc-input');
        const mdInput = document.getElementById('md-input');
        const fileNameDisplay = document.getElementById('file-name-display');
        const pAvatar = document.getElementById('p-avatar');
        const pName = document.getElementById('p-name');
        const pDesc = document.getElementById('p-desc');
        const pMarkdown = document.getElementById('p-markdown');
        const saveBtn = document.getElementById('save-btn');
        const captureArea = document.getElementById('capture-area');
        const styleBtns = document.querySelectorAll('.style-btn');

        styleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                styleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                captureArea.className = `card-wrapper ${btn.getAttribute('data-theme')}`;
            });
        });

        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            fileNameDisplay.innerText = "已选择: " + file.name.substring(0,10) + "...";
            const reader = new FileReader();
            reader.onload = (event) => pAvatar.src = event.target.result;
            reader.readAsDataURL(file);
        });

        nameInput.addEventListener('input', () => pName.innerText = nameInput.value);
        descInput.addEventListener('input', () => pDesc.innerText = descInput.value);
        function updateMarkdownPreview() { pMarkdown.innerHTML = marked.parse(mdInput.value); }
        mdInput.addEventListener('input', updateMarkdownPreview);
        updateMarkdownPreview();

        saveBtn.addEventListener('click', () => {
            saveBtn.innerText = "⏳ 处理中...";
            html2canvas(captureArea, {
                scale: 2, // 手机端2倍足够，3倍可能导致部分安卓机内存崩溃
                backgroundColor: null,
                useCORS: true,
                allowTaint: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `card_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                saveBtn.innerText = "⬇️ 保存为高清图片";
            });
        });
    </script>
</body>
</html>
