<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD 卡片生成器 Pro - 不打工的布丁</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #020617; 
            --panel-bg: #111827;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #a78bfa; 
            --export-width: 450px; /* 定义导出的标准宽度 */
        }
        
        body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            .config-panel { flex: none; width: 100%; border-right: none; border-bottom: 1px solid #334155; }
            .preview-container { padding: 30px 10px; min-height: 100vh; }
            .card-wrapper { width: 92vw !important; } 
        }

        @media (min-width: 769px) {
            .config-panel { flex: 0 0 350px; }
            .card-wrapper { width: var(--export-width); }
        }
        
        .config-panel { padding: 25px; display: flex; flex-direction: column; border-right: 1px solid #334155; overflow-y: auto; background-color: var(--panel-bg); box-sizing: border-box; }
        .config-group { margin-bottom: 20px; }
        .config-group label { display: block; color: var(--text-muted); font-size: 13px; margin-bottom: 8px; font-weight: bold; }
        .config-group input, .config-group textarea { width: 100%; background-color: #020617; color: var(--text-main); border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 14px; box-sizing: border-box; outline: none; }
        .config-group textarea { height: 150px; resize: vertical; }

        .style-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .style-btn { background: #1e293b; border: 1px solid #334155; color: var(--text-muted); padding: 10px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .style-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .preview-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; background-color: #0b1120; overflow-y: auto; padding-top: 40px; }
        
        /* 卡片样式 */
        .card-wrapper { 
            background: #1e293b; 
            border-radius: 24px; 
            padding: 35px; 
            box-sizing: border-box; 
            position: relative; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            /* 关键：确保截图时不被裁剪 */
            word-wrap: break-word;
        }

        .theme-cyber { background: linear-gradient(165deg, #1e293b 0%, #0f172a 100%); border: 1px solid rgba(167, 139, 250, 0.3); color: #fff; }
        .theme-light { background: #ffffff; color: #1f2937; border: 1px solid #e5e7eb; }
        .theme-sea { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); color: #fff; }

        .card-header { display: flex; align-items: center; margin-bottom: 25px; }
        .avatar { width: 50px; height: 50px; border-radius: 12px; margin-right: 15px; object-fit: cover; background: #334155; }
        .author-info h3 { margin: 0; font-size: 18px; }
        .author-info p { margin: 4px 0 0; font-size: 12px; opacity: 0.7; }

        .markdown-body { line-height: 1.7; font-size: 15px; }
        .markdown-body h3 { margin: 20px 0 10px; font-size: 1.2em; border-bottom: 1px solid rgba(128,128,128,0.2); padding-bottom: 5px; }
        .markdown-body blockquote { border-left: 4px solid var(--accent); margin: 15px 0; padding-left: 15px; color: var(--text-muted); font-style: italic; }
        
        .card-footer { margin-top: 40px; text-align: center; font-size: 11px; opacity: 0.5; letter-spacing: 1px; }

        .save-btn { margin: 30px 0; width: 100%; max-width: 400px; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="config-panel">
        <h2 style="margin: 0 0 20px 0; font-size: 20px;">🎛️ 配置卡片</h2>
        <div class="config-group">
            <label>卡片风格</label>
            <div class="style-selector">
                <button class="style-btn active" data-theme="theme-cyber">赛博霓虹</button>
                <button class="style-btn" data-theme="theme-light">极简白</button>
                <button class="style-btn" data-theme="theme-sea">深海蓝</button>
            </div>
        </div>
        <div class="config-group">
            <label>头像上传</label>
            <input type="file" id="avatar-input" accept="image/*">
        </div>
        <div class="config-group">
            <label>基本信息</label>
            <input type="text" id="name-input" value="不打工的布丁" style="margin-bottom: 10px;">
            <input type="text" id="desc-input" value="@Code & Life | 数字主理人">
        </div>
        <div class="config-group">
            <label>Markdown 内容</label>
            <textarea id="md-input">### 🚀 2026 计划

* **核心**：独立开发
* **工具**：Cursor + AI
* **愿景**：代码驱动生活

> “Stay hungry, stay foolish.”</textarea>
        </div>
    </div>

    <div class="preview-container">
        <div id="export-container">
            <div class="card-wrapper theme-cyber" id="capture-area">
                <div class="card-header">
                    <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA0OCA0OCI+PHJlY3Qgd2lkdGg9IjQ4IiBoZWlnaHQ9IjQ4IiByeD0iMjQiIGZpbGw9IiMzNzQxNTEiLz48cGF0aCBkPSJNMjQgMTJjLTMuMzEgMC02IDIuNjktNiA2czIuNjkgNiA2IDYgNi0yLjY5IDYtNi0yLjY5LTYtNi02em0wIDIyYy00Ljk3IDAtOS0yLjA2LTktNC42OXYtMS42MWMwLTIuNjMgNC4wMy00LjY5IDktNC42OXM5IDIuMDYgOSA0LjY5djEuNjFjMCAyLjYzLTQuMDMgNC42OS05IDQuNjl6IiBmaWxsPSIjOWRhM2I4Ii8+PC9zdmc+" class="avatar" id="p-avatar">
                    <div class="author-info">
                        <h3 id="p-name">不打工的布丁</h3>
                        <p id="p-desc">@Code & Life | 数字主理人</p>
                    </div>
                </div>
                <div class="markdown-body" id="p-markdown"></div>
                <div class="card-footer" id="p-footer">tools.lbuding.com</div>
            </div>
        </div>
        <button class="save-btn" id="save-btn">⬇️ 保存高清图片</button>
    </div>

    <script>
        const avatarInput = document.getElementById('avatar-input');
        const nameInput = document.getElementById('name-input');
        const descInput = document.getElementById('desc-input');
        const mdInput = document.getElementById('md-input');
        const pAvatar = document.getElementById('p-avatar');
        const pName = document.getElementById('p-name');
        const pDesc = document.getElementById('p-desc');
        const pMarkdown = document.getElementById('p-markdown');
        const saveBtn = document.getElementById('save-btn');
        const captureArea = document.getElementById('capture-area');
        const styleBtns = document.querySelectorAll('.style-btn');

        styleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                styleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                captureArea.className = `card-wrapper ${btn.dataset.theme}`;
            });
        });

        const updatePreview = () => {
            pName.innerText = nameInput.value;
            pDesc.innerText = descInput.value;
            pMarkdown.innerHTML = marked.parse(mdInput.value);
        };
        [nameInput, descInput, mdInput].forEach(el => el.addEventListener('input', updatePreview));
        updatePreview();

        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => pAvatar.src = ev.target.result;
                reader.readAsDataURL(file);
            }
        });

        // --- 修正后的保存逻辑 ---
        saveBtn.addEventListener('click', async () => {
            saveBtn.innerText = "⏳ 正在生成...";
            saveBtn.disabled = true;

            // 1. 关键：获取导出宽度
            const exportWidth = 450; 
            const originalStyle = captureArea.style.cssText;

            // 2. 核心修正：在保存前将元素调整为固定宽度，并确保它没有偏移
            // 我们通过设置固定宽度和重置变换来解决右侧透明问题
            captureArea.style.width = exportWidth + 'px';
            captureArea.style.transform = 'none';

            try {
                const canvas = await html2canvas(captureArea, {
                    width: exportWidth,     // 显式指定 canvas 宽度
                    scale: 2,               // 2倍高清
                    useCORS: true,
                    backgroundColor: null,  // 背景透明
                    // 关键参数：
                    scrollX: -window.scrollX,
                    scrollY: -window.scrollY,
                    windowWidth: document.documentElement.offsetWidth,
                    windowHeight: document.documentElement.offsetHeight,
                    onclone: (clonedDoc) => {
                        // 在克隆的文档里，确保该元素是可见且布局正确的
                        const clonedTarget = clonedDoc.getElementById('capture-area');
                        clonedTarget.style.width = exportWidth + 'px';
                        clonedTarget.style.margin = '0';
                    }
                });

                const link = document.createElement('a');
                link.download = `PuddingCard_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                console.error(err);
                alert("生成失败");
            } finally {
                captureArea.style.cssText = originalStyle; // 恢复预览样式
                saveBtn.innerText = "⬇️ 保存高清图片";
                saveBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
