<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 职场生存报告 | 布丁的 AI 实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .ai-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 antialiased">

    <main class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl ring-1 ring-slate-200 p-8 relative overflow-hidden">
        <div class="absolute -top-20 -left-20 w-64 h-64 bg-blue-50 rounded-full blur-3xl opacity-60"></div>
        
        <header class="text-center mb-10 relative">
            <span class="px-3 py-1 bg-slate-900 text-white text-[10px] font-black uppercase tracking-[0.2em] rounded-full">Enterprise AI v2.6</span>
            <h1 class="text-3xl font-black text-slate-900 mt-4 tracking-tight">离职生存计算器</h1>
            <p class="text-slate-400 text-sm mt-2 font-medium">DeepSeek 实时算力分析系统</p>
        </header>

        <form id="calcForm" class="space-y-4 relative">
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">City</label>
                    <input type="text" id="city" required placeholder="如：杭州" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Industry</label>
                    <input type="text" id="industry" required placeholder="如：AI 工程师" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Savings (¥)</label>
                    <input type="number" id="savings" required placeholder="存款" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Monthly Cost</label>
                    <input type="number" id="monthly_expense" required placeholder="月开销" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Mental State</label>
                <select id="mood" class="w-full px-4 py-3 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm appearance-none cursor-pointer">
                    <option value="还在苟延残喘">还在苟延残喘</option>
                    <option value="随时准备提桶跑路">随时准备提桶跑路</option>
                    <option value="已经财富自由">已经财富自由</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl transition-all shadow-xl active:scale-95">
                <span id="btnText">开始 AI 生存评估</span>
            </button>
        </form>

        <div id="resultBox" class="hidden mt-8 space-y-4">
            <div class="p-6 bg-slate-900 rounded-3xl text-center text-white">
                <p class="text-slate-400 text-[10px] uppercase font-bold tracking-widest mb-1">Months to Live</p>
                <p class="text-6xl font-black tracking-tighter" id="resultMonths">0</p>
            </div>
            <div class="p-5 bg-blue-50 rounded-3xl ai-glow">
                <p id="aiAdvice" class="text-slate-700 text-sm leading-relaxed font-medium italic">...</p>
            </div>
            <div id="recommendationCard" class="hidden p-5 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl text-white">
                <p class="text-[9px] font-black uppercase tracking-[0.2em] opacity-70 mb-2">AI Next Step Action</p>
                <h5 id="recTitle" class="text-lg font-bold mb-1">正在匹配...</h5>
                <p id="recDesc" class="text-[11px] opacity-80 mb-4">AI 正在根据您的画像规划路径。</p>
                <a id="recLink" href="#" class="inline-block w-full py-3 bg-white text-blue-600 text-center rounded-xl text-xs font-black">立即开启 →</a>
            </div>
            <button id="shareBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-2xl text-sm">📸 生成生存战报</button>
        </div>
    </main>

    <script>
        const WEBHOOK_URL = "https://nas-n8n.lbuding.com/webhook/survive-calc";
        const fpPromise = FingerprintJS.load();

        document.getElementById('calcForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            btn.disabled = true; btnText.innerText = "正在同步加密身份...";

            const fp = await fpPromise;
            const visitorId = (await fp.get()).visitorId;

            // 🚀 payload 增加了 mood 字段
            const payload = {
                visitor_id: visitorId,
                city: document.getElementById('city').value,
                industry: document.getElementById('industry').value,
                savings: document.getElementById('savings').value,
                monthly_expense: document.getElementById('monthly_expense').value,
                mood: document.getElementById('mood').value
            };

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                document.getElementById('resultMonths').innerText = data.months;
                document.getElementById('aiAdvice').innerText = data.ai_advice;
                if (data.next_step) {
                    document.getElementById('recTitle').innerText = data.next_step.title;
                    document.getElementById('recDesc').innerText = data.next_step.desc;
                    document.getElementById('recLink').href = data.next_step.url;
                    document.getElementById('recommendationCard').classList.remove('hidden');
                }
                document.getElementById('resultBox').classList.remove('hidden');
            } catch (err) { alert("算力连接失败"); }
            finally { btn.disabled = false; btnText.innerText = "重新分析现状"; }
        });
    </script>
</body>
</html>
