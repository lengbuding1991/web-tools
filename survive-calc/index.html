<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 职场生存评估 | LBUDING AI Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s; }
        .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); outline: none; }
        .loading-shimmer { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 antialiased">

    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-900/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-emerald-900/10 blur-[120px] rounded-full"></div>
    </div>

    <main class="max-w-xl w-full">
        <div class="flex items-center gap-4 mb-8">
            <a href="/" class="w-10 h-10 glass-card rounded-xl flex items-center justify-center hover:bg-white/5 transition-all text-sm">←</a>
            <div>
                <h1 class="text-2xl font-black tracking-tighter">离职生存计算器 <span class="text-blue-500 text-xs mono uppercase ml-2">v3.0</span></h1>
                <p class="text-slate-500 text-xs font-medium uppercase tracking-widest mt-1">DeepSeek-V3 驱动的风险评估引擎</p>
            </div>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8 md:p-10 shadow-2xl">
            <form id="calcForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">城市 / Location</label>
                        <input type="text" id="city" required placeholder="如：北京" class="w-full px-5 py-4 rounded-2xl input-field text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">行业 / Industry</label>
                        <input type="text" id="industry" required placeholder="如：互联网后端" class="w-full px-5 py-4 rounded-2xl input-field text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">当前存款 / Savings (¥)</label>
                        <input type="number" id="savings" required placeholder="0.00" class="w-full px-5 py-4 rounded-2xl input-field text-sm mono">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">每月开销 / Expenses (¥)</label>
                        <input type="number" id="monthly_expense" required placeholder="0.00" class="w-full px-5 py-4 rounded-2xl input-field text-sm mono">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">当前心态 / Mental State</label>
                    <select id="mood" class="w-full px-5 py-4 rounded-2xl input-field text-sm appearance-none cursor-pointer">
                        <option value="还在苟延残喘">还在苟延残喘 (Struggling)</option>
                        <option value="随时准备提桶跑路">随时准备提桶跑路 (Ready to Quit)</option>
                        <option value="已经财富自由">已经财富自由 (Financial Freedom)</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-blue-900/20 active:scale-[0.98] mt-4 uppercase tracking-widest text-sm">
                    开始算力分析
                </button>
            </form>

            <div id="resultArea" class="hidden mt-10 space-y-6">
                <div class="h-px bg-white/5 w-full my-8"></div>
                
                <div class="flex flex-col md:flex-row gap-6">
                    <div class="flex-1 p-8 rounded-3xl bg-blue-600 text-white text-center shadow-2xl shadow-blue-900/40">
                        <p class="text-[10px] font-black uppercase tracking-[0.3em] mb-2 opacity-80">生存韧性 (月)</p>
                        <h2 class="text-7xl font-black mono tracking-tighter" id="monthsResult">0.0</h2>
                    </div>
                    
                    <div class="flex-[1.5] p-6 glass-card rounded-3xl flex flex-col justify-center">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">AI Agent Analysis</span>
                        </div>
                        <p id="aiAdvice" class="text-sm leading-relaxed font-medium text-slate-200 italic">正在生成深度吐槽...</p>
                    </div>
                </div>

                <div id="nextActionCard" class="hidden p-6 rounded-3xl bg-gradient-to-r from-emerald-900/40 to-blue-900/40 border border-emerald-500/20 flex justify-between items-center group">
                    <div>
                        <p class="text-[9px] font-black text-emerald-400 uppercase tracking-widest mb-1">Recommended Action</p>
                        <h5 id="recTitle" class="text-white font-bold">简历同步优化</h5>
                        <p id="recDesc" class="text-slate-400 text-[11px] mt-1">根据压力模型，建议立即加固职场防御。</p>
                    </div>
                    <a id="recLink" href="#" class="w-12 h-12 rounded-full bg-white text-slate-900 flex items-center justify-center font-bold group-hover:scale-110 transition-transform">→</a>
                </div>
            </div>
        </div>
        
        <p class="text-center mt-8 text-[10px] font-black text-slate-700 uppercase tracking-[0.5em]">LBUDING AI LAB • SECURE INFRASTRUCTURE</p>
    </main>

    <script>
        const WEBHOOK_URL = "https://nas-n8n.lbuding.com/webhook/survive-calc";
        const IDENTITY_API = "https://nas-n8n.lbuding.com/webhook/get-user-profile"; 
        const fpPromise = FingerprintJS.load();

        // 🌟 初始化：自动回填 (Enterprise Recall)
        async function autoRecall() {
            try {
                const fp = await fpPromise;
                const result = await fp.get();
                const visitorId = result.visitorId;

                const response = await fetch(IDENTITY_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ visitor_id: visitorId })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.last_city) {
                        document.getElementById('city').value = data.last_city;
                        document.getElementById('industry').value = data.last_industry;
                        console.log("Profile Sync: Success");
                    }
                }
            } catch (e) { console.warn("Identity Recall Inactive"); }
        }

        // 提交逻辑
        document.getElementById('calcForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resultArea = document.getElementById('resultArea');
            
            btn.disabled = true;
            btn.innerText = "正在调用 DEEPSEEK 算力...";
            
            const fp = await fpPromise;
            const visitorId = (await fp.get()).visitorId;

            const payload = {
                visitor_id: visitorId,
                city: document.getElementById('city').value,
                industry: document.getElementById('industry').value,
                savings: parseFloat(document.getElementById('savings').value),
                monthly_expense: parseFloat(document.getElementById('monthly_expense').value),
                mood: document.getElementById('mood').value
            };

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();

                // 渲染结果
                document.getElementById('monthsResult').innerText = data.months;
                document.getElementById('aiAdvice').innerText = data.ai_advice;

                // 渲染智能推荐
                if (data.next_step) {
                    document.getElementById('recTitle').innerText = data.next_step.title;
                    document.getElementById('recDesc').innerText = data.next_step.desc;
                    document.getElementById('recLink').href = data.next_step.url;
                    document.getElementById('nextActionCard').classList.remove('hidden');
                }

                resultArea.classList.remove('hidden');
                resultArea.scrollIntoView({ behavior: 'smooth' });
                
            } catch (err) {
                alert("算力集群连接超时，请检查 N8n 状态。");
            } finally {
                btn.disabled = false;
                btn.innerText = "重新更新数据";
            }
        });

        window.onload = autoRecall;
    </script>
</body>
</html>
