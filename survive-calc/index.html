<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 职场毒舌顾问 | 布丁的企业级项目</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-enter { opacity: 0; transform: translateY(15px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        /* 给 AI 建议加一个酷炫的呼吸灯效果 */
        .ai-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 antialiased selection:bg-blue-200 font-sans">

    <main class="max-w-md w-full bg-white rounded-3xl shadow-2xl ring-1 ring-slate-900/5 p-8 relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-50 rounded-full blur-3xl opacity-50"></div>

        <header class="text-center mb-10 relative">
            <div class="inline-block px-3 py-1 bg-blue-100 text-blue-600 text-[10px] font-bold uppercase tracking-widest rounded-full mb-3">AI Powered System</div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">离职生存计算器</h1>
            <p class="text-slate-500 text-sm mt-2">基于 DeepSeek 模型的生存概率分析</p>
        </header>

        <form id="calcForm" class="space-y-5 relative">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">所在城市 / 行业</label>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="city" required placeholder="城市" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <input type="text" id="industry" required placeholder="行业" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">可用存款</label>
                    <input type="number" id="savings" required min="0" placeholder="¥" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">月均开销</label>
                    <input type="number" id="monthly_expense" required min="1" placeholder="¥" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">当前心态</label>
                <select id="mood" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all appearance-none cursor-pointer">
                    <option value="还在苟延残喘">还在苟延残喘</option>
                    <option value="随时准备提桶跑路">随时准备提桶跑路</option>
                    <option value="已经财富自由">已经财富自由</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="w-full flex justify-center items-center gap-3 bg-slate-900 hover:bg-black text-white font-bold py-4 px-4 rounded-xl transition-all duration-300 shadow-xl disabled:opacity-50">
                <span id="btnText">分析我的生存现状</span>
                <svg id="loadingSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
        </form>

        <div id="resultBox" class="hidden fade-enter mt-8 space-y-4">
            <div class="p-6 bg-slate-900 rounded-2xl text-center text-white shadow-2xl">
                <p class="text-slate-400 text-[10px] uppercase font-bold tracking-[0.2em] mb-1">Estimated Survival</p>
                <p class="text-5xl font-black tracking-tighter"><span id="resultMonths">0</span><span class="text-xl ml-1">Months</span></p>
            </div>
            
            <div id="aiBox" class="p-5 bg-blue-50 rounded-2xl ai-glow">
                <div class="flex items-center gap-2 mb-2">
                    <span class="flex h-2 w-2 rounded-full bg-blue-500 animate-pulse"></span>
                    <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">DeepSeek Advisor</span>
                </div>
                <p id="aiAdvice" class="text-slate-700 text-sm leading-relaxed italic font-medium">正在调取 AI 评估报告...</p>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 right-10 transform transition-all duration-300 translate-y-20 opacity-0 bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 z-50">
        <span id="toastMessage" class="text-xs font-bold"></span>
    </div>

    <script>
        const WEBHOOK_URL = "https://nas-n8n.lbuding.com/webhook/survive-calc";

        const form = document.getElementById('calcForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('loadingSpinner');
        const resultBox = document.getElementById('resultBox');
        const aiAdvice = document.getElementById('aiAdvice');
        const toast = document.getElementById('toast');

        function showToast(msg) {
            document.getElementById('toastMessage').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const payload = {
                city: document.getElementById('city').value.trim(),
                industry: document.getElementById('industry').value.trim(),
                savings: parseFloat(document.getElementById('savings').value),
                monthly_expense: parseFloat(document.getElementById('monthly_expense').value),
                mood: document.getElementById('mood').value
            };

            // 1. UI 锁定
            submitBtn.disabled = true;
            btnText.innerText = "正在深度计算...";
            spinner.classList.remove('hidden');
            resultBox.classList.add('hidden');

            try {
                // 2. 发送请求并等待 N8n 携带 AI 结果返回
                const response = await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("API Connection Failed");

                const data = await response.json();

                // 3. 渲染结果（使用后端返回的精准生存月数和 AI 建议）
                document.getElementById('resultMonths').innerText = data.months;
                aiAdvice.innerText = data.ai_advice || "AI 暂时陷入了沉思...";

                // 4. 显示结果区并触发动画
                resultBox.classList.remove('hidden');
                setTimeout(() => resultBox.classList.add('fade-enter-active'), 10);
                
                showToast("分析报告生成成功");
            } catch (error) {
                console.error(error);
                showToast("系统繁忙，请稍后再试");
            } finally {
                submitBtn.disabled = false;
                btnText.innerText = "重新分析";
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
