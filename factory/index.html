<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价值工厂 - 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { --main-blue: #3b82f6; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); color: #94a3b8; font-family: 'Inter', 'PingFang SC', sans-serif; overflow: hidden; }
        
        .tech-grid { 
            background-image: radial-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 0); 
            background-size: 30px 30px; 
        }

        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.15); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: #f8fafc !important; }
        input:focus { border-color: var(--main-blue) !important; outline: none; }
        
        .loading-line { height: 2px; width: 0%; background: var(--main-blue); transition: width 0.4s; box-shadow: 0 0 10px var(--main-blue); }

        /* 🚩 Markdown 深度优化排版 */
        .prose h2 { color: #fff !important; font-size: 1.5rem !important; margin-top: 2rem !important; margin-bottom: 1rem !important; display: flex; align-items: center; gap: 10px; }
        .prose h2::before { content: "SECTION"; font-size: 8px; background: var(--main-blue); color: #fff; padding: 2px 6px; border-radius: 4px; font-style: normal; }
        .prose strong { color: #60a5fa !important; background: rgba(59, 130, 246, 0.1); padding: 0 4px; border-radius: 2px; }
        .prose p { line-height: 1.8 !important; margin-bottom: 1.2em !important; }
        .prose li { margin-bottom: 0.5em !important; }

        /* 🚩 海报特定样式 */
        #posterWrapper { width: 450px; background: #050a15; margin: 0 auto; display: none; } /* 仅用于截图 */
        .poster-header { border-bottom: 1px solid rgba(59, 130, 246, 0.3); padding-bottom: 20px; margin-bottom: 30px; }
        .poster-footer { border-top: 1px solid rgba(255, 255, 255, 0.05); margin-top: 40px; padding-top: 20px; }
    </style>
</head>
<body class="tech-grid min-h-screen h-screen flex flex-col md:flex-row">

    <div id="loader" class="loading-line fixed top-0 left-0 z-50"></div>

    <aside class="w-full md:w-72 sidebar p-6 hidden md:flex flex-col gap-6 shrink-0 glass-panel">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-white text-xl shadow-lg">布</div>
            <div>
                <h2 class="font-black text-white tracking-tighter text-lg">价值工厂</h2>
                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">Pudding Lab v3.0</p>
            </div>
        </div>
        <div class="flex-1 flex flex-col min-h-0">
            <p class="text-[10px] font-bold text-slate-500 mb-2 tracking-widest">系统实时日志</p>
            <div id="logs" class="flex-1 bg-black/40 p-4 rounded-lg border border-white/5 overflow-y-auto font-mono text-[10px] text-slate-500 space-y-1">
                <div>> 系统已就绪</div>
                <div>> 生产链路已联通</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header class="h-16 flex items-center justify-between px-8 border-b border-white/5 shrink-0">
            <span class="text-xs font-bold text-slate-400">当前车间：灵感变现提取处</span>
            <a href="/" class="px-4 py-1.5 glass-panel rounded-full text-xs hover:text-white transition-colors">返回基地</a>
        </header>

        <div class="flex-1 overflow-y-auto p-8 md:p-12">
            <div class="max-w-4xl mx-auto space-y-12">
                
                <div class="glass-panel p-8 rounded-[2.5rem] shadow-2xl">
                    <h3 class="text-xl font-black text-white mb-8 flex items-center gap-3">
                        <span class="w-1 h-6 bg-blue-600 rounded-full"></span>
                        输入“瞎折腾”原材料
                    </h3>
                    <form id="factoryForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold text-slate-500 uppercase">核心技能</label>
                            <input type="text" id="skills" required placeholder="Python, 剪辑, 写作" class="w-full px-5 py-3.5 rounded-xl text-sm transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold text-slate-500 uppercase">投入精力</label>
                            <input type="text" id="commitment" required placeholder="每天2小时" class="w-full px-5 py-3.5 rounded-xl text-sm transition-all">
                        </div>
                        <div class="md:col-span-2 space-y-2">
                            <label class="text-[11px] font-bold text-slate-500 uppercase">变现赛道</label>
                            <select id="sector" class="w-full px-5 py-3.5 rounded-xl text-sm outline-none transition-all cursor-pointer">
                                <option value="AI 自动化">AI 自动化</option>
                                <option value="数字化套利">数字化套利</option>
                                <option value="内容工厂">内容工厂</option>
                                <option value="Micro-SaaS">微型 SaaS</option>
                            </select>
                        </div>
                        <div class="md:col-span-2 pt-4">
                            <button type="submit" id="submitBtn" class="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl text-sm uppercase tracking-[0.3em] transition-all shadow-xl shadow-blue-900/40 active:scale-[0.98]">
                                生成变现蓝图
                            </button>
                        </div>
                    </form>
                </div>

                <div id="resultArea" class="hidden space-y-6">
                    <div class="flex items-center gap-4">
                        <div class="h-px flex-1 bg-blue-500/20"></div>
                        <span class="text-[10px] font-black text-blue-500 uppercase tracking-[0.5em]">PREVIEW / 实时预览</span>
                        <div class="h-px flex-1 bg-blue-500/20"></div>
                    </div>
                    
                    <div class="glass-panel p-10 md:p-16 rounded-[3rem] relative">
                        <div id="blueprintContent" class="prose prose-invert prose-blue max-w-none text-slate-200"></div>
                        <div class="mt-12 flex justify-end">
                            <button onclick="generatePoster()" id="posterBtn" class="px-8 py-3 bg-blue-600 text-white rounded-full font-black text-xs uppercase tracking-widest hover:bg-blue-500 transition-all shadow-lg shadow-blue-900/40">
                                导出手机分享海报
                            </button>
                        </div>
                    </div>
                </div>

                <div id="posterWrapper" class="p-10">
                    <div class="poster-header flex justify-between items-center">
                        <div>
                            <h2 class="text-white font-black text-2xl tracking-tighter">布丁实验室</h2>
                            <p class="text-blue-500 text-[10px] font-bold uppercase tracking-[0.3em]">AI Value Blueprint</p>
                        </div>
                        <div class="text-right text-[8px] text-slate-600 mono leading-tight">
                            CONFIDENTIAL<br>B-SERIES 2026
                        </div>
                    </div>
                    
                    <div id="posterContent" class="prose prose-invert prose-blue max-w-none"></div>

                    <div class="poster-footer flex justify-between items-end">
                        <div class="space-y-1">
                            <p class="text-[10px] text-white font-bold italic underline">tools.lbuding.com</p>
                            <p class="text-[8px] text-slate-600 uppercase">专注生产有用的废话与有价值的代码</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-slate-500 mono" id="posterID">---</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://nas-n8n.lbuding.com/webhook/factory-engine";
        const logs = document.getElementById('logs');
        const fpPromise = FingerprintJS.load();

        function addLog(msg, color = 'slate-500') {
            const div = document.createElement('div');
            div.className = `text-${color}`;
            div.innerText = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            logs.prepend(div);
        }

        async function generatePoster() {
            const btn = document.getElementById('posterBtn');
            const wrapper = document.getElementById('posterWrapper');
            btn.innerText = "正在排版高清海报...";
            btn.disabled = true;

            // 临时显示用于拍照
            wrapper.style.display = 'block';
            
            try {
                const canvas = await html2canvas(wrapper, {
                    backgroundColor: "#050a15",
                    scale: 3, // 提高到 3 倍，确保文字极度锐利
                    logging: false,
                    useCORS: true,
                    windowWidth: 450 // 强制窗口宽度
                });
                
                const link = document.createElement('a');
                link.download = `Pudding_Blueprint_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                addLog("高清分享海报已生成。", "emerald-500");
            } catch (err) {
                console.error(err);
                addLog("海报生成失败。", "red-500");
            } finally {
                wrapper.style.display = 'none';
                btn.innerText = "导出手机分享海报";
                btn.disabled = false;
            }
        }

        document.getElementById('factoryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resultArea = document.getElementById('resultArea');
            const content = document.getElementById('blueprintContent');
            const posterContent = document.getElementById('posterContent');
            const loader = document.getElementById('loader');

            btn.disabled = true; btn.innerText = "机器运转中...";
            loader.style.width = "40%";
            addLog("正在提取灵感价值...", "blue-400");

            try {
                const fp = await fpPromise;
                const vid = (await fp.get()).visitorId;
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        visitor_id: vid,
                        skills: document.getElementById('skills').value,
                        commitment: document.getElementById('commitment').value,
                        sector: document.getElementById('sector').value
                    })
                });

                loader.style.width = "80%";
                const data = await response.json();
                
                if (data && data.blueprint) {
                    const html = marked.parse(data.blueprint);
                    content.innerHTML = html;
                    posterContent.innerHTML = html; // 同步到隐藏的海报区
                    document.getElementById('posterID').innerText = `ID:${vid.substring(0,12).toUpperCase()}`;
                    
                    resultArea.classList.remove('hidden');
                    loader.style.width = "100%";
                    addLog("蓝图已就绪。", "emerald-500");
                    setTimeout(() => loader.style.width = "0%", 1000);
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (err) {
                addLog(`错误：${err.message}`, "red-500");
                alert("工厂临时停电！");
            } finally {
                btn.disabled = false; btn.innerText = "生成变现蓝图";
            }
        });
    </script>
</body>
</html>
