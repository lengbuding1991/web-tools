<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价值工厂 - 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --main-blue: #3b82f6; --bg-dark: #020617; }
        /* 🚀 核心修复：解除 body 的高度锁定，恢复原生流畅滚动 */
        body { background-color: var(--bg-dark); color: #94a3b8; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .tech-grid { background-image: radial-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 0); background-size: 30px 30px; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(59, 130, 246, 0.15); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 门禁锁屏层 */
        #lockscreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: opacity 0.5s ease; }
        
        /* 通知系统 */
        #notify-container { position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .notify-card { pointer-events: auto; min-width: 280px; padding: 16px 20px; border-radius: 12px; border: 1px solid; animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); display: flex; align-items: center; gap: 12px; }
        .notify-error { border-color: #ef4444; color: #fca5a5; box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
        .notify-success { border-color: #10b981; color: #a7f3d0; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .notify-info { border-color: #3b82f6; color: #bfdbfe; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

        /* 海报容器隐藏 */
        #posterWrapper { position: fixed; top: -9999px; left: -9999px; width: 600px; background: #050a15; z-index: -1; }
        
        /* 滚动条与输入框美化 */
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: #f8fafc !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.5); }
        
        /* Markdown 文本提亮 */
        .prose h1, .prose h2, .prose h3, .prose strong { color: #f8fafc !important; }
        .prose a { color: #3b82f6 !important; text-decoration: none; }
        .prose code { color: #93c5fd !important; background: rgba(59,130,246,0.1); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body class="tech-grid flex flex-col lg:flex-row w-full relative">

    <div id="notify-container"></div>

    <div id="lockscreen">
        <div id="lockTitle" class="text-blue-500 font-bold mono animate-pulse tracking-[0.5em] text-lg transition-colors">FACTORY_VERIFYING...</div>
        <div id="lockSub" class="mt-4 text-[10px] text-slate-600 mono transition-colors">正在核验物理架构师权限</div>
    </div>

    <aside class="w-full lg:w-80 p-6 md:p-8 flex flex-col gap-6 lg:fixed lg:inset-y-0 lg:left-0 lg:h-screen glass-panel z-20 border-r border-white/5 shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-white text-2xl shadow-[0_0_20px_rgba(59,130,246,0.4)]">布</div>
            <div>
                <h2 class="font-black text-white text-xl tracking-wide">价值工厂</h2>
                <span class="text-[9px] text-blue-500 mono uppercase tracking-widest">DeepSeek Engine v3</span>
            </div>
        </div>
        <div class="p-5 bg-[#050a15] rounded-xl border border-white/5 mono text-[10px] text-slate-500 flex-1 overflow-y-auto hidden lg:block shadow-inner" id="logs">
            > 初始化工厂终端...<br>> 核心算力池连接成功...<br>> 准备接收灵感投料。
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-h-screen min-w-0 z-10 lg:ml-80">
        
        <header class="h-20 shrink-0 flex items-center justify-between px-8 border-b border-white/5 glass-panel sticky top-0 z-30 backdrop-blur-xl">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse shadow-[0_0_10px_#3b82f6]"></div>
                <span class="text-[11px] font-bold text-slate-400 mono tracking-widest" id="userTag">LOADING_STATION</span>
            </div>
            <a href="/" class="px-5 py-2 border border-white/10 rounded-full text-[10px] font-bold uppercase text-slate-400 hover:bg-blue-600 hover:text-white hover:border-blue-600 transition-all shadow-sm">返回基地</a>
        </header>

        <div class="p-6 md:p-10 lg:p-16 flex-1">
            <div class="max-w-4xl mx-auto space-y-12 pb-24">
                
                <div class="glass-panel p-8 md:p-12 rounded-[2.5rem] shadow-xl">
                    <form id="factoryForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-3">
                            <label class="text-[10px] uppercase font-black text-blue-500 tracking-widest ml-1">核心技能输入</label>
                            <input type="text" id="skills" required placeholder="如: Python编程, 英语翻译" class="w-full px-6 py-4 bg-[#0a1122] border border-white/10 rounded-xl text-sm text-white focus:border-blue-500 outline-none transition-all placeholder-slate-600">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[10px] uppercase font-black text-blue-500 tracking-widest ml-1">时间精力投料</label>
                            <input type="text" id="commitment" required placeholder="如: 每天下班后2小时" class="w-full px-6 py-4 bg-[#0a1122] border border-white/10 rounded-xl text-sm text-white focus:border-blue-500 outline-none transition-all placeholder-slate-600">
                        </div>
                        <div class="md:col-span-2 space-y-3">
                            <label class="text-[10px] uppercase font-black text-blue-500 tracking-widest ml-1">生产线选择</label>
                            <select id="sector" class="w-full px-6 py-4 bg-[#0a1122] border border-white/10 rounded-xl text-sm text-white focus:border-blue-500 outline-none transition-all cursor-pointer">
                                <option value="AI 自动化">⚡ AI 自动化工具链</option>
                                <option value="内容工厂">📝 高产内容流水线</option>
                                <option value="数字化套利">🌍 数字化地理套利</option>
                            </select>
                        </div>
                        <button type="submit" id="submitBtn" class="md:col-span-2 py-5 mt-4 bg-blue-600 text-white font-black rounded-xl text-sm uppercase tracking-widest hover:bg-blue-500 active:scale-95 transition-all shadow-[0_0_20px_rgba(59,130,246,0.3)]">调配算力 · 生成价值蓝图</button>
                    </form>
                </div>

                <div id="resultArea" class="hidden glass-panel p-8 md:p-14 rounded-[3rem] shadow-2xl border border-blue-500/20">
                    <div id="blueprintContent" class="prose prose-invert prose-blue max-w-none text-slate-300 leading-relaxed"></div>
                    
                    <div class="mt-16 pt-8 border-t border-white/10 flex justify-end">
                        <button onclick="generatePoster()" id="posterBtn" class="px-8 py-4 bg-blue-600/10 border border-blue-500/30 text-blue-400 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all">↓ 导出为高清海报</button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="posterWrapper" class="p-16 border-4 border-blue-500/20">
        <h2 class="text-white text-4xl font-black mb-2 uppercase italic tracking-tighter">Pudding Lab</h2>
        <p class="text-blue-500 text-xs mono mb-12 tracking-[0.4em] uppercase">Value_Blueprint_Output</p>
        <div id="posterContent" class="prose prose-invert prose-blue max-w-none"></div>
    </div>

    <script>
        const ENGINE_API = "https://nas-n8n.lbuding.com/webhook/factory-engine";

        function showNotify(msg, type = 'info') {
            const container = document.getElementById('notify-container');
            const card = document.createElement('div');
            card.className = `notify-card notify-${type} mono text-[11px] font-bold`;
            const icon = type === 'error' ? '⚠️' : type === 'success' ? '✅' : '⚡';
            const title = type === 'error' ? 'FACTORY_ALERT' : type === 'success' ? 'SYSTEM_READY' : 'ENGINE_INFO';
            card.innerHTML = `<span class="text-xl">${icon}</span><div><div class="uppercase opacity-50 mb-1 text-[9px]">${title}</div><div class="leading-tight">${msg}</div></div>`;
            container.appendChild(card);
            setTimeout(() => { card.style.animation = 'fadeOut 0.5s forwards'; setTimeout(() => card.remove(), 500); }, 3500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const t = localStorage.getItem('pudding_token');
            const u = localStorage.getItem('pudding_user');
            const lockscreen = document.getElementById('lockscreen');
            const lockTitle = document.getElementById('lockTitle');
            const lockSub = document.getElementById('lockSub');

            if (!t || !u) { 
                lockTitle.innerText = "ACCESS_DENIED";
                lockTitle.classList.replace('text-blue-500', 'text-red-500');
                lockSub.innerText = "未检测到有效身份凭证";
                lockscreen.style.backgroundColor = 'rgba(10,0,0,0.95)';
                showNotify("非法闯入，正在遣返大本营...", "error");
                
                setTimeout(() => { window.location.href = "/"; }, 1500);
                return; 
            }

            // 物理破防开门
            setTimeout(() => {
                lockscreen.style.opacity = '0';
                setTimeout(() => lockscreen.style.display = 'none', 500);
                document.getElementById('userTag').innerText = u.toUpperCase() + "_STATION";
                showNotify("算力链路连接成功，欢迎入驻。", "success");
            }, 800);
        });

        document.getElementById('factoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); 
            btn.innerText = "算力正在燃烧..."; 
            btn.disabled = true;
            showNotify("正在提交投料，唤醒 DeepSeek 引擎...", "info");
            
            try {
                const res = await fetch(ENGINE_API, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('pudding_token')}` }, 
                    body: JSON.stringify({ skills: document.getElementById('skills').value, commitment: document.getElementById('commitment').value, sector: document.getElementById('sector').value }) 
                });
                
                if (res.status === 401) {
                    showNotify("凭证已过期，系统强制注销", "error");
                    setTimeout(() => { localStorage.clear(); window.location.href = "/"; }, 1500);
                    return;
                }

                const data = await res.json();
                if (data.blueprint) {
                    const html = marked.parse(data.blueprint);
                    document.getElementById('blueprintContent').innerHTML = html;
                    document.getElementById('posterContent').innerHTML = html;
                    document.getElementById('resultArea').classList.remove('hidden');
                    showNotify("蓝图生成完毕", "success");
                    
                    // 平滑滚动至结果
                    setTimeout(() => {
                        document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 300);
                }
            } catch (err) { 
                showNotify("引擎连接中断，请检查网络或 NAS 状态", "error");
            } finally { 
                btn.innerText = "调配算力 · 生成价值蓝图"; 
                btn.disabled = false; 
            }
        });

        async function generatePoster() {
            const btn = document.getElementById('posterBtn');
            const wrap = document.getElementById('posterWrapper'); 
            btn.innerText = "正在排版像素...";
            wrap.style.display = 'block';
            showNotify("正在渲染高清海报，请稍候...", "info");
            
            try {
                const canvas = await html2canvas(wrap, { backgroundColor: "#050a15", scale: 2, useCORS: true });
                const link = document.createElement('a'); 
                link.download = `Pudding_Blueprint_${Date.now()}.png`; 
                link.href = canvas.toDataURL('image/png'); 
                link.click();
                showNotify("海报导出成功！", "success");
            } catch(e) {
                showNotify("渲染海报失败，请重试", "error");
            } finally {
                wrap.style.display = 'none';
                btn.innerText = "↓ 导出为高清海报";
            }
        }
    </script>
</body>
</html>
