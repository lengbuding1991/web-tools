<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价值工厂 - 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { --main-blue: #3b82f6; --bg-color: #050a15; }
        body { background-color: var(--bg-color); color: #94a3b8; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* 科技感网格背景 */
        .tech-grid { 
            background-image: linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px); 
            background-size: 25px 25px; 
        }

        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.15); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 侧边状态栏样式 */
        .sidebar { border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .log-text { font-size: 11px; font-family: 'JetBrains Mono'; line-height: 1.6; }

        /* 输入框优化 */
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: #f8fafc !important; }
        input:focus { border-color: var(--main-blue) !important; outline: none; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        
        /* 蓝色进度条 */
        .loading-line { height: 2px; width: 0%; background: var(--main-blue); transition: width 0.4s; box-shadow: 0 0 10px var(--main-blue); }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="tech-grid min-h-screen h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-72 sidebar p-6 hidden md:flex flex-col gap-6 shrink-0 glass-panel">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-white text-xl shadow-lg">布</div>
            <div>
                <h2 class="font-black text-white tracking-tighter text-lg">价值工厂</h2>
                <p class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">Pudding Lab v3.0</p>
            </div>
        </div>
        
        <div class="flex-1 flex flex-col min-h-0">
            <p class="text-[10px] font-bold text-slate-500 mb-2 tracking-widest">系统实时日志</p>
            <div id="logs" class="flex-1 bg-black/40 p-4 rounded-lg border border-white/5 overflow-y-auto log-text text-slate-500 space-y-1">
                <div>> 系统已就绪</div>
                <div>> 等待指令输入...</div>
            </div>
        </div>

        <div class="glass-panel p-4 rounded-xl border-l-4 border-emerald-500">
            <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">后端节点状态</p>
            <div class="flex items-center gap-2 text-xs text-emerald-500 font-bold">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                算力中心：已连接
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <div id="loader" class="loading-line absolute top-0 left-0 z-50"></div>

        <header class="h-16 flex items-center justify-between px-8 border-b border-white/5 shrink-0">
            <div class="flex items-center gap-4">
                <span class="text-xs font-bold text-slate-400">当前车间：灵感变现提取处</span>
            </div>
            <a href="/" class="px-4 py-1.5 glass-panel rounded-full text-xs hover:text-white transition-colors">返回基地主页</a>
        </header>

        <div class="flex-1 overflow-y-auto p-8 md:p-12">
            <div class="max-w-4xl mx-auto space-y-12">
                
                <div class="glass-panel p-8 md:p-10 rounded-[2.5rem] shadow-2xl">
                    <h3 class="text-xl font-black text-white mb-8 flex items-center gap-3">
                        <span class="w-1 h-6 bg-blue-600 rounded-full"></span>
                        输入你的“瞎折腾”原材料
                    </h3>
                    
                    <form id="factoryForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">你擅长的技能</label>
                            <input type="text" id="skills" required placeholder="如：Python、视频剪辑、写文章" class="w-full px-5 py-3.5 rounded-xl text-sm transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">你能投入的精力</label>
                            <input type="text" id="commitment" required placeholder="如：每天2小时，或仅周末" class="w-full px-5 py-3.5 rounded-xl text-sm transition-all">
                        </div>
                        <div class="md:col-span-2 space-y-2">
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">你感兴趣的变现赛道</label>
                            <select id="sector" class="w-full px-5 py-3.5 rounded-xl text-sm outline-none transition-all cursor-pointer">
                                <option value="AI 自动化">AI 自动化 (解放双手，构建数字工人)</option>
                                <option value="数字化套利">数字化套利 (利用信息差，在全球市场获利)</option>
                                <option value="内容工厂">内容工厂 (自动化内容生产与分发)</option>
                                <option value="Micro-SaaS">微型 SaaS (开发小而美的工具产品)</option>
                            </select>
                        </div>
                        <div class="md:col-span-2 pt-4">
                            <button type="submit" id="submitBtn" class="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl text-sm uppercase tracking-[0.3em] transition-all shadow-xl shadow-blue-900/40 active:scale-[0.98]">
                                立即运行变现逻辑提取
                            </button>
                        </div>
                    </form>
                </div>

                <div id="resultArea" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-8 duration-1000">
                    <div class="flex items-center gap-4">
                        <div class="h-px flex-1 bg-blue-500/20"></div>
                        <span class="text-[10px] font-black text-blue-500 uppercase tracking-[0.5em]">AI 商业蓝图已生成</span>
                        <div class="h-px flex-1 bg-blue-500/20"></div>
                    </div>
                    
                    <div class="bg-[#0f172a] p-10 md:p-16 rounded-[3rem] border border-blue-500/30 shadow-[0_0_50px_rgba(59,130,246,0.1)] relative">
                        <div class="absolute top-10 right-10 text-[10px] text-slate-800 font-bold mono select-none">
                            HASH_ID: <span id="resHash">---</span>
                        </div>
                        
                        <div id="blueprintContent" class="text-slate-200 text-base md:text-lg leading-relaxed whitespace-pre-wrap font-medium">
                            </div>

                        <div class="mt-16 pt-8 border-t border-white/5 flex justify-between items-center">
                            <p class="text-[10px] text-slate-600 font-bold mono uppercase">LBUDING Factory Processed // 2026</p>
                            <button onclick="window.print()" class="text-[10px] font-black text-blue-500 hover:text-white transition-colors">导出为 PDF 存档</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://nas-n8n.lbuding.com/webhook/factory-engine"; 
        const logs = document.getElementById('logs');
        const fpPromise = FingerprintJS.load();

        function addLog(msg, color = 'slate-500') {
            const div = document.createElement('div');
            div.className = `text-${color}`;
            div.innerText = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            logs.prepend(div);
        }

        document.getElementById('factoryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resultArea = document.getElementById('resultArea');
            const content = document.getElementById('blueprintContent');
            const loader = document.getElementById('loader');

            btn.disabled = true;
            btn.innerText = "机器正在高速运转中...";
            loader.style.width = "40%";
            addLog("正在向 n8n 节点发送提取指令...", "blue-400");

            try {
                const fp = await fpPromise;
                const vid = (await fp.get()).visitorId;
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        visitor_id: vid,
                        skills: document.getElementById('skills').value,
                        commitment: document.getElementById('commitment').value,
                        sector: document.getElementById('sector').value
                    })
                });

                loader.style.width = "80%";
                if (!response.ok) throw new Error("连接故障");

                const data = await response.json();
                
                if (data && data.blueprint) {
                    content.innerText = data.blueprint;
                    document.getElementById('resHash').innerText = vid.substring(0,10).toUpperCase();
                    
                    resultArea.classList.remove('hidden');
                    loader.style.width = "100%";
                    addLog("变现蓝图解析完成，已渲染至界面。", "emerald-500");
                    setTimeout(() => loader.style.width = "0%", 1000);
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (err) {
                addLog(`错误：${err.message}`, "red-500");
                alert("工厂临时停电！请确认 n8n 的 Production URL 是否正确，且右上角 Active 是否已开启。");
            } finally {
                btn.disabled = false;
                btn.innerText = "投入新灵感";
            }
        });
    </script>
</body>
</html>
