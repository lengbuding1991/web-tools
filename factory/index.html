<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价值工厂 - 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { --main-blue: #3b82f6; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* 科技感网格 - 保持老板喜欢的样式 */
        .tech-grid { 
            background-image: radial-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 0); 
            background-size: 30px 30px; 
        }

        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .factory-card { border: 1px solid rgba(59, 130, 246, 0.2); box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); }
        .glow-blue { box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: #f8fafc !important; }
        input:focus { border-color: var(--main-blue) !important; outline: none; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        
        .loader-line { height: 2px; width: 0%; background: var(--main-blue); transition: width 0.4s; box-shadow: 0 0 10px var(--main-blue); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .result-glow { animation: breath 3s ease-in-out infinite; }
        @keyframes breath { 0%, 100% { border-color: rgba(59, 130, 246, 0.2); } 50% { border-color: rgba(59, 130, 246, 0.5); } }

        /* 🚩 3. 针对蓝图内容的 Markdown 美化样式 */
        .prose h2 { color: #fff !important; margin-top: 1.5em !important; border-left: 3px solid var(--main-blue); padding-left: 10px; }
        .prose strong { color: #60a5fa !important; }
        .prose li { color: #cbd5e1 !important; }
        .prose code { color: #fbbf24 !important; background: rgba(251, 191, 36, 0.1) !important; padding: 2px 4px !important; border-radius: 4px; }
    </style>
</head>
<body class="tech-grid min-h-screen flex flex-col">

    <div id="loader" class="loader-line fixed top-0 left-0 z-50"></div>

    <nav class="h-16 flex items-center justify-between px-8 glass border-b border-white/5 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white">布</div>
            <span class="text-xs font-bold tracking-[0.2em] text-white uppercase">Pudding Factory // 01车间</span>
        </div>
        <div class="flex items-center gap-6">
            <div class="hidden md:flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-slate-500 uppercase">算力：DeepSeek-V3 已就绪</span>
            </div>
            <a href="/" class="text-[10px] font-bold border border-white/10 px-4 py-1.5 rounded-full hover:bg-white/5 transition-all text-slate-400">返回基地</a>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-6 md:p-12">
        <div class="max-w-5xl mx-auto space-y-12">
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                
                <div class="lg:col-span-5">
                    <div class="glass p-8 rounded-[2rem] factory-card">
                        <h3 class="text-lg font-black text-white mb-8 flex items-center gap-3">
                            <span class="w-1 h-5 bg-blue-600 rounded-full"></span>
                            灵感原材料输入
                        </h3>
                        
                        <form id="factoryForm" class="space-y-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">核心技能</label>
                                <input type="text" id="skills" required placeholder="如：Python, 视频剪辑, 写作" class="w-full px-5 py-3.5 rounded-2xl text-sm">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">投入精力</label>
                                <input type="text" id="commitment" required placeholder="如：每天2小时, 或仅周末" class="w-full px-5 py-3.5 rounded-2xl text-sm">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">变现赛道</label>
                                <select id="sector" class="w-full px-5 py-3.5 rounded-2xl text-sm outline-none cursor-pointer">
                                    <option value="AI 自动化">AI 自动化 (No-code / Agent)</option>
                                    <option value="数字化套利">数字化套利 (Global Arbitrage)</option>
                                    <option value="内容工厂">内容工厂 (Content Automation)</option>
                                    <option value="Micro-SaaS">微型 SaaS (Niche Products)</option>
                                </select>
                            </div>
                            <button type="submit" id="submitBtn" class="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl text-[11px] uppercase tracking-[0.3em] transition-all glow-blue active:scale-[0.98]">
                                启动变现蓝图提取指令
                            </button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-7 flex flex-col gap-6">
                    <div id="logPanel" class="glass h-40 p-4 rounded-3xl overflow-hidden flex flex-col border border-white/5">
                        <p class="text-[9px] font-bold text-slate-600 uppercase mb-2">System_Logs // 系统日志</p>
                        <div id="logs" class="flex-1 overflow-y-auto text-[10px] mono text-slate-500 space-y-1">
                            <div>> 初始化完毕，等待输入...</div>
                        </div>
                    </div>

                    <div id="resultArea" class="hidden flex-1 glass p-10 md:p-14 rounded-[2.5rem] result-glow border-2 transition-all overflow-y-auto">
                        <div class="flex items-center justify-between mb-8 border-b border-white/5 pb-4">
                            <h2 class="text-white font-black italic text-xl uppercase tracking-tighter">Verified_Blueprint</h2>
                            <span class="text-[9px] mono text-slate-600" id="resHash">ID: ---</span>
                        </div>
                        <div id="blueprintContent" class="prose prose-invert prose-blue max-w-none text-slate-300">
                            </div>
                    </div>

                    <div id="placeholder" class="flex-1 glass rounded-[2.5rem] flex items-center justify-center opacity-20 border-dashed border-white/10">
                        <p class="text-[10px] uppercase tracking-[0.4em]">等待原材料注入以渲染蓝图</p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const YOUR_N8N_URL = "https://nas-n8n.lbuding.com/webhook/factory-engine"; 

        const logs = document.getElementById('logs');
        const fpPromise = FingerprintJS.load();

        function addLog(msg, type = 'default') {
            const div = document.createElement('div');
            const colors = { 'default': 'text-slate-500', 'info': 'text-blue-500', 'success': 'text-emerald-500', 'error': 'text-red-500' };
            div.className = colors[type];
            div.innerText = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            logs.prepend(div);
        }

        document.getElementById('factoryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resultArea = document.getElementById('resultArea');
            const placeholder = document.getElementById('placeholder');
            const content = document.getElementById('blueprintContent');
            const loader = document.getElementById('loader');

            btn.disabled = true; btn.innerText = "正在提取中...";
            loader.style.width = "40%";
            addLog("正在向后端发送加密载荷...", "info");

            try {
                const fp = await fpPromise;
                const vid = (await fp.get()).visitorId;
                
                const response = await fetch(YOUR_N8N_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        visitor_id: vid,
                        skills: document.getElementById('skills').value,
                        commitment: document.getElementById('commitment').value,
                        sector: document.getElementById('sector').value
                    })
                });

                loader.style.width = "80%";
                if (!response.ok) throw new Error("连接响应异常");

                const data = await response.json();
                
                if (data && data.blueprint) {
                    // 🚩 5. 核心逻辑改动：使用 marked 解析 Markdown 并填充 HTML
                    content.innerHTML = marked.parse(data.blueprint);
                    
                    document.getElementById('resHash').innerText = `ID: ${vid.substring(0,10).toUpperCase()}`;
                    
                    placeholder.classList.add('hidden');
                    resultArea.classList.remove('hidden');
                    loader.style.width = "100%";
                    addLog("成功提取商业蓝图，渲染就绪。", "success");
                    setTimeout(() => loader.style.width = "0%", 1000);
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (err) {
                addLog(`系统故障: ${err.message}`, "error");
                alert("工厂临时停电！\n请确认 n8n 是否开启。");
            } finally {
                btn.disabled = false; btn.innerText = "投入新灵感";
            }
        });
    </script>
</body>
</html>
