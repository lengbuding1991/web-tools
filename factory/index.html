<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价值工厂 - 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --main-blue: #3b82f6; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); color: #94a3b8; font-family: 'Inter', sans-serif; overflow: hidden; }
        .tech-grid { background-image: radial-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 0); background-size: 30px 30px; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.15); }
        #lockscreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #lockscreen.hidden { display: none; }
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: #f8fafc !important; }
    </style>
</head>
<body class="tech-grid min-h-screen flex flex-col md:flex-row">
    <div id="lockscreen"><div class="text-blue-500 mono animate-pulse tracking-[0.5em]">AUTH_VERIFYING...</div></div>

    <aside class="w-full md:w-72 p-6 flex flex-col gap-6 glass-panel">
        <div class="flex items-center gap-3"><div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-white text-xl">布</div><h2 class="font-black text-white text-lg">价值工厂</h2></div>
        <p class="text-[10px] mono text-slate-600">> 核心算法：DEEPSEEK_V3</p>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 flex items-center justify-between px-8 border-b border-white/5">
            <span class="text-[10px] font-bold text-slate-500 mono" id="userTag">LOADING_STATION</span>
            <a href="/" class="px-4 py-1.5 glass-panel rounded-full text-[10px] font-bold uppercase hover:bg-blue-600 transition-all">返回基地</a>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-4xl mx-auto space-y-8">
                <div class="glass-panel p-8 rounded-[2rem]">
                    <form id="factoryForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" id="skills" required placeholder="核心技能" class="w-full px-6 py-4 rounded-xl text-sm outline-none">
                        <input type="text" id="commitment" required placeholder="投入精力" class="w-full px-6 py-4 rounded-xl text-sm outline-none">
                        <select id="sector" class="md:col-span-2 px-6 py-4 rounded-xl text-sm outline-none">
                            <option value="AI 自动化">AI 自动化工具链</option><option value="内容工厂">高产内容流水线</option>
                        </select>
                        <button type="submit" id="submitBtn" class="md:col-span-2 py-5 bg-blue-600 text-white font-black rounded-xl text-xs uppercase tracking-widest">生成价值蓝图</button>
                    </form>
                </div>
                <div id="resultArea" class="hidden glass-panel p-10 rounded-[2rem]">
                    <div id="blueprintContent" class="prose prose-invert prose-blue max-w-none text-slate-300"></div>
                    <button onclick="generatePoster()" class="mt-8 px-8 py-3 bg-blue-600/20 border border-blue-500/30 text-blue-400 rounded-full text-[10px] font-bold uppercase">导出高清蓝图</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const ENGINE_API = "https://nas-n8n.lbuding.com/webhook/factory-engine";
        const PROFILE_API = "https://nas-n8n.lbuding.com/webhook/get-user-profile";

        async function init() {
            const t = localStorage.getItem('pudding_token');
            const u = localStorage.getItem('pudding_user');
            if (!t) { window.location.href = "/"; return; }
            
            // 🚩 暴力开门：只要本地有名字，瞬间撤除遮罩
            if (u) {
                document.getElementById('lockscreen').classList.add('hidden');
                document.getElementById('userTag').innerText = u.toUpperCase() + "_STATION";
            }

            try {
                const res = await fetch(PROFILE_API, { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${t}`} });
                const data = await res.json();
                if (data.status === 'authorized') {
                    document.getElementById('lockscreen').classList.add('hidden');
                    document.getElementById('userTag').innerText = data.username.toUpperCase() + "_STATION";
                    localStorage.setItem('pudding_user', data.username);
                } else { throw new Error(); }
            } catch (e) { 
                console.warn("审计未过，若是网络问题将保留访问权限");
                if (!u) window.location.href = "/"; // 只有完全没缓存才踢出去
            }
        }
        window.onload = init;

        document.getElementById('factoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.innerText = "算力同步中..."; btn.disabled = true;
            try {
                const res = await fetch(ENGINE_API, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('pudding_token')}` }, body: JSON.stringify({ skills: document.getElementById('skills').value, commitment: document.getElementById('commitment').value, sector: document.getElementById('sector').value }) });
                const data = await res.json();
                if (data.blueprint) {
                    document.getElementById('blueprintContent').innerHTML = marked.parse(data.blueprint);
                    document.getElementById('resultArea').classList.remove('hidden');
                }
            } catch (err) { alert("引擎连接中断"); } finally { btn.innerText = "生成价值蓝图"; btn.disabled = false; }
        });
    </script>
</body>
</html>
