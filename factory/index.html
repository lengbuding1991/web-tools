<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价值工厂 - 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --main-blue: #3b82f6; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); color: #94a3b8; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .tech-grid { background-image: radial-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 0); background-size: 30px 30px; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .factory-card { border: 1px solid rgba(59, 130, 246, 0.2); }
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: #f8fafc !important; }
        input:focus { border-color: var(--main-blue) !important; outline: none; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        .loader-line { height: 2px; width: 0%; background: var(--main-blue); transition: width 0.4s; box-shadow: 0 0 10px var(--main-blue); }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* 🚩 Markdown 样式定制：让排版带上极客味 */
        .prose h2 { color: #fff !important; font-weight: 800 !important; border-left: 4px solid var(--main-blue); padding-left: 1rem; margin-top: 2rem !important; }
        .prose strong { color: #60a5fa !important; }
        .prose code { background: #1e293b !important; color: #fbbf24 !important; padding: 0.2rem 0.4rem !important; border-radius: 4px; font-family: 'JetBrains Mono'; }
        .prose li { color: #cbd5e1 !important; }
        .prose p { color: #94a3b8 !important; }
    </style>
</head>
<body class="tech-grid min-h-screen flex flex-col">

    <div id="loader" class="loader-line fixed top-0 left-0 z-50"></div>

    <nav class="h-16 flex items-center justify-between px-8 glass border-b border-white/5 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white">布</div>
            <span class="text-xs font-bold tracking-[0.2em] text-white uppercase">价值工厂 // 01车间</span>
        </div>
        <a href="/" class="text-[10px] font-bold border border-white/10 px-4 py-1.5 rounded-full hover:bg-white/5 transition-all text-slate-400">返回基地</a>
    </nav>

    <main class="flex-1 overflow-y-auto p-6 md:p-12">
        <div class="max-w-6xl mx-auto space-y-12">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                
                <div class="lg:col-span-4">
                    <div class="glass p-8 rounded-[2rem] factory-card">
                        <h3 class="text-lg font-black text-white mb-8 border-b border-white/5 pb-4">灵感原材料</h3>
                        <form id="factoryForm" class="space-y-6">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">核心技能</label>
                                <input type="text" id="skills" required placeholder="如：Python, 视频剪辑" class="w-full px-5 py-3.5 rounded-2xl text-sm">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">投入精力</label>
                                <input type="text" id="commitment" required placeholder="如：每天2小时" class="w-full px-5 py-3.5 rounded-2xl text-sm">
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">变现赛道</label>
                                <select id="sector" class="w-full px-5 py-3.5 rounded-2xl text-sm outline-none cursor-pointer">
                                    <option value="AI 自动化">AI 自动化 (No-code / Agent)</option>
                                    <option value="数字化套利">数字化套利 (Global Arbitrage)</option>
                                    <option value="内容工厂">内容工厂 (Content Automation)</option>
                                    <option value="Micro-SaaS">微型 SaaS (Niche Products)</option>
                                </select>
                            </div>
                            <button type="submit" id="submitBtn" class="w-full py-5 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl text-[11px] uppercase tracking-[0.3em] transition-all active:scale-[0.98]">
                                启动价值提取
                            </button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-8 flex flex-col gap-6">
                    <div class="glass h-32 p-4 rounded-3xl overflow-hidden flex flex-col border border-white/5">
                        <div id="logs" class="flex-1 overflow-y-auto text-[10px] mono text-slate-600 space-y-1">
                            <div>> 系统就绪，等待输入指令...</div>
                        </div>
                    </div>

                    <div id="resultArea" class="hidden glass p-10 md:p-16 rounded-[3rem] border border-blue-500/20 shadow-2xl relative">
                        <div class="absolute top-10 right-10 opacity-5 text-8xl font-black italic select-none mono">P-LAB</div>
                        <div id="blueprintContent" class="prose prose-invert prose-blue max-w-none">
                            </div>
                        
                        <div class="mt-16 pt-8 border-t border-white/5 flex justify-between items-center">
                            <span class="text-[9px] mono text-slate-600" id="resHash">ID: ---</span>
                            <button onclick="window.print()" class="text-[10px] font-black text-blue-500 hover:text-white transition-colors">导出存档</button>
                        </div>
                    </div>

                    <div id="placeholder" class="flex-1 glass rounded-[3rem] flex items-center justify-center opacity-20 border-dashed border-white/10">
                        <p class="text-[10px] uppercase tracking-[0.4em]">等待数据注入以渲染蓝图</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const YOUR_N8N_URL = "https://nas-n8n.lbuding.com/webhook/factory-engine"; 
        const logs = document.getElementById('logs');
        const fpPromise = FingerprintJS.load();

        function addLog(msg, type = 'default') {
            const div = document.createElement('div');
            const colors = { 'default': 'text-slate-600', 'success': 'text-emerald-500', 'info': 'text-blue-500' };
            div.className = colors[type];
            div.innerText = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            logs.prepend(div);
        }

        document.getElementById('factoryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resultArea = document.getElementById('resultArea');
            const placeholder = document.getElementById('placeholder');
            const content = document.getElementById('blueprintContent');
            const loader = document.getElementById('loader');

            btn.disabled = true; btn.innerText = "正在生产中...";
            loader.style.width = "40%";
            addLog("正在通过加密隧道传输原材料...", "info");

            try {
                const fp = await fpPromise;
                const vid = (await fp.get()).visitorId;
                
                const response = await fetch(YOUR_N8N_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        visitor_id: vid,
                        skills: document.getElementById('skills').value,
                        commitment: document.getElementById('commitment').value,
                        sector: document.getElementById('sector').value
                    })
                });

                loader.style.width = "80%";
                const data = await response.json();
                
                if (data && data.blueprint) {
                    // 🚩 核心修改：使用 marked.parse() 将 Markdown 转为 HTML
                    content.innerHTML = marked.parse(data.blueprint);
                    
                    document.getElementById('resHash').innerText = `ID: ${vid.substring(0,10).toUpperCase()}`;
                    placeholder.classList.add('hidden');
                    resultArea.classList.remove('hidden');
                    loader.style.width = "100%";
                    addLog("价值提取成功，商业蓝图已渲染。", "success");
                    setTimeout(() => loader.style.width = "0%", 1000);
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                }
            } catch (err) {
                addLog(`系统报错: ${err.message}`, "error");
                alert("工厂临时停电，请检查网络链接。");
            } finally {
                btn.disabled = false; btn.innerText = "投入新灵感";
            }
        });
    </script>
</body>
</html>
