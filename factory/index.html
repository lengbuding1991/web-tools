<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FACTORY-v3 | 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #020617; color: #94a3b8; font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .active-border { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .sidebar { border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .terminal-text { font-size: 11px; line-height: 1.6; }
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: #f8fafc !important; }
        input:focus { border-color: #3b82f6 !important; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        .shimmer { animation: shimmer 2s infinite; background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.1), transparent); background-size: 200% 100%; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row overflow-hidden">

    <aside class="w-full md:w-64 sidebar p-6 hidden md:flex flex-col gap-6 shrink-0">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center font-bold text-white">P</div>
            <span class="text-white font-bold tracking-tighter">PUDDING-V3</span>
        </div>
        
        <div class="space-y-4">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">SYSTEM_LOGS</p>
            <div id="logs" class="terminal-text text-slate-600 h-64 overflow-hidden">
                <div class="mb-1 text-emerald-500">> SYSTEM_READY</div>
                <div class="mb-1">> FINGERPRINT_INIT...</div>
            </div>
        </div>

        <div class="mt-auto glass-panel p-4 rounded-xl">
            <p class="text-[9px] font-bold text-blue-500 uppercase mb-2">Network Status</p>
            <div class="flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-xs text-slate-400">Node-n8n: Connected</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-6 md:p-12">
        <div class="max-w-4xl mx-auto">
            <header class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="text-xs font-bold text-blue-500 mb-2 tracking-[0.3em] uppercase">Blueprint Extraction Facility</h2>
                    <h1 class="text-4xl font-black text-white tracking-tighter uppercase italic">价值工厂车间</h1>
                </div>
                <a href="/" class="px-4 py-2 glass-panel rounded-lg text-[10px] hover:text-white transition-colors">BACK_TO_BASE</a>
            </header>

            <div class="grid grid-cols-1 gap-8">
                <div class="glass-panel p-8 rounded-3xl relative overflow-hidden">
                    <div class="shimmer absolute inset-0 opacity-20 pointer-events-none"></div>
                    <form id="factoryForm" class="grid grid-cols-1 md:grid-cols-3 gap-6 relative z-10">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">核心技能</label>
                            <input type="text" id="skills" required placeholder="如：Python" class="w-full px-4 py-3 rounded-xl text-sm transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">投入精力</label>
                            <input type="text" id="commitment" required placeholder="如：2h/天" class="w-full px-4 py-3 rounded-xl text-sm transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">关注方向</label>
                            <select id="sector" class="w-full px-4 py-3 rounded-xl text-sm outline-none transition-all">
                                <option value="AI 自动化">AI 自动化</option>
                                <option value="数字化套利">数字化套利</option>
                                <option value="内容工厂">内容工厂</option>
                                <option value="Micro-SaaS">Micro-SaaS</option>
                            </select>
                        </div>
                        <div class="md:col-span-3">
                            <button type="submit" id="submitBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl text-[11px] uppercase tracking-[0.3em] transition-all shadow-xl shadow-blue-900/40">
                                立即执行价值提取指令
                            </button>
                        </div>
                    </form>
                </div>

                <div id="resultContainer" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-700">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="h-px flex-1 bg-white/5"></div>
                        <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Blueprint Output</span>
                        <div class="h-px flex-1 bg-white/5"></div>
                    </div>
                    
                    <div class="bg-[#0f172a] p-10 md:p-16 rounded-[2.5rem] border border-blue-500/20 shadow-2xl relative">
                        <div class="absolute top-8 right-8 text-[10px] text-slate-700 font-bold mono uppercase">ID: <span id="resHash">---</span></div>
                        <div id="blueprintContent" class="text-slate-300 text-sm md:text-base leading-relaxed whitespace-pre-wrap font-medium">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://nas-n8n.lbuding.com/webhook/factory-engine"; // 确保这是生产 URL
        const logs = document.getElementById('logs');
        const fpPromise = FingerprintJS.load();

        function addLog(msg) {
            const div = document.createElement('div');
            div.className = "mb-1";
            div.innerText = `> ${msg}`;
            logs.prepend(div);
        }

        document.getElementById('factoryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resultArea = document.getElementById('resultContainer');
            const content = document.getElementById('blueprintContent');

            btn.disabled = true; btn.innerText = "EXECUTING...";
            addLog("REQUEST_SENT_TO_N8N");

            try {
                const fp = await fpPromise;
                const vid = (await fp.get()).visitorId;
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        visitor_id: vid,
                        skills: document.getElementById('skills').value,
                        commitment: document.getElementById('commitment').value,
                        sector: document.getElementById('sector').value
                    })
                });

                if (!response.ok) throw new Error("HTTP_ERROR_" + response.status);

                const data = await response.json();
                
                if (data && data.blueprint) {
                    content.innerText = data.blueprint;
                    document.getElementById('resHash').innerText = vid.substring(0,8).toUpperCase();
                    resultArea.classList.remove('hidden');
                    addLog("BLUEPRINT_RENDERED_SUCCESS");
                    resultArea.scrollIntoView({ behavior: 'smooth' });
                } else {
                    throw new Error("EMPTY_DATA");
                }
            } catch (err) {
                addLog(`ERROR: ${err.message}`);
                alert(`工厂停电: [${err.message}] 
1. 请确认 N8n 工作流已点击右上角 Save
2. 请确认工作流右上角 Active 开关已打开
3. 请确认 Webhook 节点里使用的是 Production URL`);
            } finally {
                btn.disabled = false; btn.innerText = "投入新灵感";
            }
        });
    </script>
</body>
</html>
