<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FACTORY-LAB | 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --glow-blue: #3b82f6; --bg-dark: #050a15; }
        body { background-color: var(--bg-dark); color: #94a3b8; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        
        /* 科技感装饰 */
        .tech-grid { background-image: linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px); background-size: 20px 20px; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.1); }
        .glow-text { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        /* 输入框优化 */
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: #f8fafc !important; border-radius: 4px !important; }
        input:focus { border-color: var(--glow-blue) !important; outline: none; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); }
        
        .loading-bar { height: 2px; width: 0%; background: var(--glow-blue); transition: width 0.3s; box-shadow: 0 0 10px var(--glow-blue); }
    </style>
</head>
<body class="tech-grid min-h-screen h-screen flex flex-col">

    <nav class="h-14 border-b border-white/5 flex items-center justify-between px-6 shrink-0 glass-panel">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                <span class="text-xs font-bold text-white tracking-widest">PUDDING_FACTORY / v3.0</span>
            </div>
            <div class="h-4 w-px bg-white/10"></div>
            <div class="text-[10px] text-slate-500 uppercase">Status: <span class="text-emerald-500">Processing_Node_Active</span></div>
        </div>
        <a href="/" class="text-[10px] hover:text-blue-400 transition-colors uppercase border border-white/10 px-3 py-1 rounded">← Exit_Factory</a>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        <aside class="w-full md:w-80 border-r border-white/5 p-6 flex flex-col gap-8 shrink-0">
            <div>
                <h2 class="text-xs font-black text-blue-500 uppercase mb-4 tracking-widest">Injection_Params</h2>
                <form id="factoryForm" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold text-slate-500 uppercase">Core_Skills</label>
                        <input type="text" id="skills" required placeholder="SKILLS_LIST..." class="w-full px-4 py-3 text-xs">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold text-slate-500 uppercase">Daily_Commitment</label>
                        <input type="text" id="commitment" required placeholder="HRS_PER_DAY..." class="w-full px-4 py-3 text-xs">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] font-bold text-slate-500 uppercase">Target_Sector</label>
                        <select id="sector" class="w-full px-4 py-3 text-xs outline-none">
                            <option value="AI 自动化">AI_AUTOMATION</option>
                            <option value="数字化套利">DIGITAL_ARBITRAGE</option>
                            <option value="内容工厂">CONTENT_FACTORY</option>
                            <option value="Micro-SaaS">MICRO_SAAS</option>
                        </select>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-black text-[10px] uppercase tracking-[0.2em] transition-all shadow-lg shadow-blue-900/40">
                        EXECUTE_PROMPT_ENGINE
                    </button>
                </form>
            </div>

            <div class="flex-1 flex flex-col min-h-0">
                <h2 class="text-[9px] font-black text-slate-500 uppercase mb-2 tracking-widest">Console_Output</h2>
                <div id="logs" class="flex-1 bg-black/40 p-4 rounded border border-white/5 overflow-y-auto text-[10px] text-slate-600 space-y-1">
                    <div>> BOOT_SEQUENCE_COMPLETE</div>
                    <div>> FINGERPRINT_SYNCED</div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#020617] relative">
            <div id="loadingBar" class="loading-bar absolute top-0 left-0 z-20"></div>
            
            <div class="flex-1 p-8 md:p-12 overflow-y-auto flex flex-col">
                <div id="placeholder" class="m-auto text-center opacity-20">
                    <div class="text-6xl mb-4">⚛️</div>
                    <p class="text-[10px] uppercase tracking-[0.5em]">Waiting_for_input_data</p>
                </div>

                <div id="resultArea" class="hidden max-w-3xl mx-auto w-full">
                    <div class="flex items-center justify-between mb-8 border-b border-blue-500/20 pb-4">
                        <h2 class="text-white font-bold tracking-tighter uppercase text-xl italic glow-text">Output_Blueprint</h2>
                        <span class="text-[9px] text-slate-600 mono" id="resHash">HASH: ---</span>
                    </div>
                    <div id="blueprintContent" class="text-slate-300 text-sm md:text-base leading-relaxed whitespace-pre-wrap">
                        </div>
                    
                    <div class="mt-12 flex justify-end gap-4">
                        <button onclick="window.print()" class="text-[10px] border border-white/10 px-4 py-2 hover:bg-white/5 transition-all uppercase">Save_to_File</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://nas-n8n.lbuding.com/webhook/factory-engine"; 
        const logs = document.getElementById('logs');
        const fpPromise = FingerprintJS.load();

        function addLog(msg, color = 'slate-600') {
            const div = document.createElement('div');
            div.className = `text-${color}`;
            div.innerText = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            logs.prepend(div);
        }

        document.getElementById('factoryForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const resultArea = document.getElementById('resultArea');
            const placeholder = document.getElementById('placeholder');
            const content = document.getElementById('blueprintContent');
            const loader = document.getElementById('loadingBar');

            btn.disabled = true; btn.innerText = "PROCESS_START";
            loader.style.width = "30%";
            addLog("SENDING_PAYLOAD", "blue-500");

            try {
                const fp = await fpPromise;
                const vid = (await fp.get()).visitorId;
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        visitor_id: vid,
                        skills: document.getElementById('skills').value,
                        commitment: document.getElementById('commitment').value,
                        sector: document.getElementById('sector').value
                    })
                });

                loader.style.width = "70%";
                if (!response.ok) throw new Error(`HTTP_${response.status}`);

                const data = await response.json();
                
                if (data && data.blueprint) {
                    content.innerText = data.blueprint;
                    document.getElementById('resHash').innerText = `HASH: ${vid.substring(0,12).toUpperCase()}`;
                    
                    placeholder.classList.add('hidden');
                    resultArea.classList.remove('hidden');
                    loader.style.width = "100%";
                    addLog("DEEPSEEK_DECODING_SUCCESS", "emerald-500");
                    setTimeout(() => loader.style.width = "0%", 1000);
                }
            } catch (err) {
                addLog(`ERROR: ${err.message}`, "red-500");
                alert(`工厂停电: ${err.message}\n请检查 n8n 节点设置与数据库连接。`);
            } finally {
                btn.disabled = false; btn.innerText = "EXECUTE_AGAIN";
            }
        });
    </script>
</body>
</html>
