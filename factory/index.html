<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价值工厂 - 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root { --main-blue: #3b82f6; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); color: #94a3b8; font-family: 'Inter', sans-serif; overflow: hidden; }
        .tech-grid { background-image: radial-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 0); background-size: 30px 30px; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.15); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        #lockscreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: #f8fafc !important; }
        #posterWrapper { width: 450px; background: #050a15; display: none; }
    </style>
</head>
<body class="tech-grid min-h-screen flex flex-col md:flex-row">
    <div id="lockscreen" class="hidden"><div class="text-blue-500 mono animate-pulse uppercase tracking-[0.5em]">Auth_Required...</div></div>

    <aside class="w-full md:w-72 p-6 flex flex-col gap-6 shrink-0 glass-panel">
        <div class="flex items-center gap-3"><div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-white text-xl">布</div><h2 class="font-black text-white text-lg">价值工厂</h2></div>
        <div class="p-4 bg-black/40 rounded-lg border border-white/5 mono text-[9px] text-slate-500 flex-1 overflow-y-auto" id="logs">> 系统就绪...</div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 flex items-center justify-between px-8 border-b border-white/5">
            <span class="text-xs font-bold text-slate-500 mono">FACTORY_MODE_V3</span>
            <a href="/" class="px-4 py-1.5 glass-panel rounded-full text-[10px] font-bold uppercase hover:text-white">返回基地</a>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="max-w-4xl mx-auto space-y-8">
                <div class="glass-panel p-8 rounded-[2rem]">
                    <form id="factoryForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" id="skills" required placeholder="核心技能" class="w-full px-6 py-4 rounded-xl text-sm outline-none">
                        <input type="text" id="commitment" required placeholder="投入精力" class="w-full px-6 py-4 rounded-xl text-sm outline-none">
                        <select id="sector" class="md:col-span-2 px-6 py-4 rounded-xl text-sm outline-none">
                            <option value="AI 自动化">AI 自动化</option><option value="内容工厂">内容工厂</option>
                        </select>
                        <button type="submit" id="submitBtn" class="md:col-span-2 py-5 bg-blue-600 text-white font-black rounded-xl text-xs uppercase tracking-widest">生成价值蓝图</button>
                    </form>
                </div>
                <div id="resultArea" class="hidden glass-panel p-10 rounded-[2rem]">
                    <div id="blueprintContent" class="prose prose-invert prose-blue max-w-none text-slate-300"></div>
                    <button onclick="generatePoster()" id="posterBtn" class="mt-8 px-8 py-3 bg-blue-600 text-white rounded-full text-[10px] font-black uppercase">导出蓝图海报</button>
                </div>
            </div>
        </div>
    </main>

    <div id="posterWrapper" class="p-12 bg-[#050a15] border-2 border-blue-500/20"><h2 class="text-white text-2xl font-black mb-10">PUDDING LAB // BLUEPRINT</h2><div id="posterContent" class="prose prose-invert prose-blue"></div></div>

    <script>
        const API_URL = "https://nas-n8n.lbuding.com/webhook/factory-engine";
        window.onload = () => { if (!localStorage.getItem('pudding_token')) { document.getElementById('lockscreen').classList.remove('hidden'); setTimeout(() => location.href = "/", 1500); } };

        document.getElementById('factoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = "正在同步算力...";
            try {
                const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('pudding_token')}` }, body: JSON.stringify({ skills: document.getElementById('skills').value, commitment: document.getElementById('commitment').value, sector: document.getElementById('sector').value }) });
                if (res.status === 401) { location.href = "/"; return; }
                const data = await res.json();
                if (data.blueprint) {
                    const html = marked.parse(data.blueprint);
                    document.getElementById('blueprintContent').innerHTML = html;
                    document.getElementById('posterContent').innerHTML = html;
                    document.getElementById('resultArea').classList.remove('hidden');
                }
            } catch (err) { alert("连接失败"); } finally { btn.disabled = false; btn.innerText = "生成价值蓝图"; }
        });

        async function generatePoster() {
            const wrapper = document.getElementById('posterWrapper'); wrapper.style.display = 'block';
            const canvas = await html2canvas(wrapper, { backgroundColor: "#050a15", scale: 2 });
            const link = document.createElement('a'); link.download = `Factory_${Date.now()}.png`; link.href = canvas.toDataURL(); link.click();
            wrapper.style.display = 'none';
        }
    </script>
</body>
</html>
