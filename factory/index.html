<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价值工厂 - 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/dist/fp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --main-blue: #3b82f6; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); color: #94a3b8; font-family: 'Inter', sans-serif; overflow: hidden; }
        .tech-grid { background-image: radial-gradient(rgba(59, 130, 246, 0.1) 1px, transparent 0); background-size: 30px 30px; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(59, 130, 246, 0.15); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        #lockscreen { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; flex-direction: column; items-center; justify-center; }
        .glitch-red { color: #ef4444; font-weight: 800; animation: glitch 0.3s infinite; text-transform: uppercase; letter-spacing: 0.5em; }
        @keyframes glitch { 0% { transform: translate(2px, 0); } 50% { transform: translate(-2px, 0); } 100% { transform: translate(0, 0); } }
        .prose h2 { color: #fff !important; border-left: 4px solid var(--main-blue); padding-left: 1rem; }
        #posterWrapper { width: 450px; background: #050a15; margin: 0 auto; display: none; }
    </style>
</head>
<body class="tech-grid min-h-screen flex flex-col md:flex-row">
    <div id="lockscreen" class="hidden">
        <div class="mono text-[10px] text-blue-500 mb-4 tracking-[1em]">SECURITY_CHECK</div>
        <div class="glitch-red text-2xl mb-8">Unauthorized Access</div>
        <div class="w-64 h-1 bg-white/5 rounded-full overflow-hidden"><div id="lock-progress" class="h-full bg-blue-600 transition-all duration-1000" style="width: 0%"></div></div>
    </div>
    <script>
        (function() { if (!localStorage.getItem('pudding_token')) { document.getElementById('lockscreen').classList.remove('hidden'); setTimeout(() => { document.getElementById('lock-progress').style.width = "100%"; }, 100); setTimeout(() => { window.location.href = "/"; }, 2500); } })();
    </script>

    <aside class="w-full md:w-72 p-6 hidden md:flex flex-col gap-6 shrink-0 glass-panel">
        <div class="flex items-center gap-3 mb-4">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-white text-xl">布</div>
            <h2 class="font-black text-white text-lg">价值工厂</h2>
        </div>
        <div class="p-3 border border-blue-500/20 rounded bg-blue-500/5 mono text-[9px]">
            <div class="text-blue-400 font-bold uppercase mb-1">Compute Center</div>
            <div id="compute-text" class="text-white">AUTHORIZED_ACCESS</div>
        </div>
        <div id="logs" class="flex-1 bg-black/40 p-4 rounded-lg border border-white/5 font-mono text-[10px] text-slate-500 overflow-y-auto"><div>> 身份验证成功</div></div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 flex items-center justify-between px-8 border-b border-white/5 shrink-0">
            <span class="text-xs font-bold text-slate-400">灵感变现提取处</span>
            <a href="/" class="px-4 py-1.5 glass-panel rounded-full text-xs hover:text-white transition-colors">返回基地</a>
        </header>
        <div class="flex-1 overflow-y-auto p-8 md:p-12">
            <div class="max-w-4xl mx-auto space-y-12">
                <div class="glass-panel p-8 rounded-[3rem] shadow-2xl">
                    <h3 class="text-xl font-black text-white mb-8 italic">架构师，请注入原材料</h3>
                    <form id="factoryForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <input type="text" id="skills" required placeholder="核心技能" class="w-full px-5 py-4 rounded-xl text-sm bg-slate-900 border-white/10 text-white outline-none">
                        <input type="text" id="commitment" required placeholder="投入精力" class="w-full px-5 py-4 rounded-xl text-sm bg-slate-900 border-white/10 text-white outline-none">
                        <select id="sector" class="md:col-span-2 w-full px-5 py-4 rounded-xl text-sm bg-slate-900 border-white/10 text-white outline-none">
                            <option value="AI 自动化">AI 自动化</option><option value="数字化套利">数字化套利</option>
                        </select>
                        <button type="submit" id="submitBtn" class="md:col-span-2 py-5 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl text-xs uppercase tracking-[0.3em] transition-all">生成变现蓝图</button>
                    </form>
                </div>
                <div id="resultArea" class="hidden glass-panel p-10 md:p-16 rounded-[3rem] relative">
                    <div id="blueprintContent" class="prose prose-invert prose-blue max-w-none text-slate-200"></div>
                    <button onclick="generatePoster()" id="posterBtn" class="mt-8 px-8 py-3 bg-blue-600 text-white rounded-full text-xs font-black uppercase tracking-widest">导出海报</button>
                </div>
            </div>
        </div>
    </main>

    <div id="posterWrapper" class="p-10 bg-[#050a15] border-2 border-blue-500/20">
        <div class="border-b border-blue-500/30 pb-6 mb-8 flex justify-between items-center">
            <h1 class="text-white text-2xl font-black">布丁实验室 // 价值工厂</h1>
            <p class="text-[8px] text-slate-600 mono">B-SERIES 2026</p>
        </div>
        <div id="posterContent" class="prose prose-invert prose-blue"></div>
        <div class="mt-10 pt-6 border-t border-white/10 flex justify-between items-end">
            <p class="text-blue-500 font-bold italic text-[10px]">tools.lbuding.com</p>
            <p class="text-[8px] text-slate-500 mono" id="posterID">ID:---</p>
        </div>
    </div>

    <script>
        const API_URL = "https://nas-n8n.lbuding.com/webhook/factory-engine";
        document.getElementById('factoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = "信号同步中...";
            const vid = (await (await FingerprintJS.load()).get()).visitorId;
            const res = await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('pudding_token')}`}, body: JSON.stringify({ visitor_id: vid, skills: document.getElementById('skills').value, commitment: document.getElementById('commitment').value, sector: document.getElementById('sector').value })});
            if(res.status === 401) { location.reload(); return; }
            const data = await res.json();
            if(data.blueprint) { document.getElementById('blueprintContent').innerHTML = marked.parse(data.blueprint); document.getElementById('posterContent').innerHTML = marked.parse(data.blueprint); document.getElementById('resultArea').classList.remove('hidden'); document.getElementById('posterID').innerText = vid.substring(0,12).toUpperCase(); }
            btn.disabled = false; btn.innerText = "生成变现蓝图";
        });
        async function generatePoster() { const canvas = await html2canvas(document.getElementById('posterWrapper'), { backgroundColor: "#050a15", scale: 2 }); const link = document.createElement('a'); link.download = 'Blueprint.png'; link.href = canvas.toDataURL(); link.click(); }
    </script>
</body>
</html>
