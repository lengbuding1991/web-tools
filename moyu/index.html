<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>带薪摸鱼计算器 - 不打工的布丁</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981; /* 搞钱的绿色 */
            --danger: #ef4444;
        }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #334155;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            align-items: center;
        }
        .input-group label {
            color: var(--text-muted);
            font-size: 14px;
        }
        .input-group input {
            background: #0f172a;
            border: 1px solid #334155;
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 8px;
            width: 120px;
            text-align: right;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--accent);
        }
        .money-display {
            font-size: 48px;
            font-weight: 900;
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent);
            margin: 30px 0;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            font-variant-numeric: tabular-nums;
        }
        .controls {
            display: flex;
            gap: 15px;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        #startBtn {
            background: var(--accent);
            color: #fff;
        }
        #startBtn:hover {
            background: #059669;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }
        #stopBtn {
            background: #334155;
            color: var(--text-main);
        }
        #stopBtn:hover {
            background: #475569;
        }
        .status {
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-muted);
            min-height: 20px;
        }
        /* 呼吸灯特效 */
        .working {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { text-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
            50% { text-shadow: 0 0 30px rgba(16, 185, 129, 0.8); }
            100% { text-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>☕ 带薪摸鱼计算器</h1>
    <p class="subtitle">既然走不掉，那就看看能薅老板多少羊毛</p>

    <div class="input-group">
        <label>月薪 (元):</label>
        <input type="number" id="salary" value="10000">
    </div>
    <div class="input-group">
        <label>每月上班 (天):</label>
        <input type="number" id="days" value="22">
    </div>
    <div class="input-group">
        <label>每天上班 (小时):</label>
        <input type="number" id="hours" value="8">
    </div>

    <div class="money-display" id="display">￥0.000000</div>

    <div class="controls">
        <button id="startBtn">开始摸鱼 🚀</button>
        <button id="stopBtn">老板来了 🚨</button>
    </div>

    <div class="status" id="statusMsg">输入薪资，点击开始</div>
</div>

<script>
    let timer = null;
    let earned = 0;
    let moneyPerSecond = 0;

    const salaryInput = document.getElementById('salary');
    const daysInput = document.getElementById('days');
    const hoursInput = document.getElementById('hours');
    const display = document.getElementById('display');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusMsg = document.getElementById('statusMsg');

    function calculateRate() {
        const salary = parseFloat(salaryInput.value) || 0;
        const days = parseFloat(daysInput.value) || 1;
        const hours = parseFloat(hoursInput.value) || 1;
        // 每秒钟赚多少钱
        moneyPerSecond = salary / (days * hours * 3600);
    }

    startBtn.addEventListener('click', () => {
        if (timer) return; // 已经在跑了
        
        calculateRate();
        statusMsg.innerText = "正在疯狂吸血老板的钱包...";
        display.classList.add('working');
        startBtn.innerText = "摸鱼中...";
        startBtn.style.opacity = "0.7";

        // 每 50 毫秒刷新一次，让数字滚动得极其丝滑，增加爽感
        timer = setInterval(() => {
            earned += moneyPerSecond / 20; 
            display.innerText = "￥" + earned.toFixed(6);
        }, 50);
    });

    stopBtn.addEventListener('click', () => {
        if (!timer) return;
        
        clearInterval(timer);
        timer = null;
        display.classList.remove('working');
        startBtn.innerText = "继续摸鱼 🚀";
        startBtn.style.opacity = "1";
        statusMsg.innerText = `本次摸鱼共赚取 ￥${earned.toFixed(4)}，可以买杯奶茶了！`;
        
        // 如果想每次重置，可以加这行：
        // earned = 0; 
    });
</script>

</body>
</html>
