<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资产指挥中心 | 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --vault-purple: #a855f7; --bg-dark: #020617; }
        
        body { background-color: var(--bg-dark); color: #94a3b8; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .tech-grid { background-image: radial-gradient(rgba(168, 85, 247, 0.1) 1px, transparent 0); background-size: 30px 30px; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(168, 85, 247, 0.15); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* UI 卡片样式 */
        .stat-card { background: linear-gradient(135deg, rgba(168, 85, 247, 0.12) 0%, rgba(15, 23, 42, 1) 100%); border: 1px solid rgba(168, 85, 247, 0.2); transition: all 0.4s; cursor: pointer; }
        .stat-card.active { border-color: var(--vault-purple); background: linear-gradient(135deg, rgba(168, 85, 247, 0.25) 0%, rgba(15, 23, 42, 1) 100%); }
        .asset-card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .asset-card:hover { border-color: var(--vault-purple); transform: scale(1.02); }
        .shredder-btn { position: absolute; top: 20px; right: 20px; opacity: 0; color: #64748b; }
        .asset-card:hover .shredder-btn { opacity: 0.6; }
        
        #lockscreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        #notify-container { position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .notify-card { pointer-events: auto; min-width: 280px; padding: 16px 20px; border-radius: 12px; border: 1px solid rgba(168, 85, 247, 0.3); background: rgba(15, 23, 42, 0.95); animation: slideIn 0.4s forwards; }
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* 🚀 极致兼容打印样式 */
        @media print {
            /* 1. 隐藏非打印内容 */
            body > *:not(#print-area) { display: none !important; visibility: hidden !important; }
            
            /* 2. 强行还原打印区域 */
            #print-area { 
                display: block !important; 
                visibility: visible !important; 
                position: relative !important; 
                left: 0 !important; 
                top: 0 !important; 
                width: 100% !important; 
                background: #ffffff !important; 
                color: #000000 !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            /* 3. 彻底消除黑边和阴影 */
            #print-area, #print-area * {
                box-shadow: none !important;
                text-shadow: none !important;
                border-radius: 0 !important; /* 手机端圆角常导致黑边 */
                background-clip: padding-box !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .prose { max-width: none !important; font-size: 11pt !important; line-height: 1.6 !important; }
            .prose h1, .prose h2 { color: #000 !important; border-bottom: 1px solid #eee !important; padding-bottom: 5px !important; }
            pre { background: #f8f8f8 !important; border: 1px solid #ddd !important; padding: 10px !important; }
            
            @page { margin: 1.5cm; size: auto; }
        }

        /* 🚀 关键：平时不使用 display:none，而是移出屏幕，防止打印机抓不到内容 */
        #print-area { 
            position: absolute; 
            left: -9999px; 
            top: -9999px; 
            width: 800px; 
            background: white; 
            color: #111;
        }
    </style>
</head>
<body class="tech-grid p-4 md:p-12">

    <div id="notify-container"></div>
    <div id="lockscreen"><div class="text-purple-500 font-bold mono animate-pulse tracking-[1em] text-lg uppercase">Vault_Syncing...</div></div>

    <div id="print-area">
        <div style="padding-bottom: 20px; border-bottom: 3px solid #a855f7; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="margin:0; font-size:28px; color: #000;">布丁实验室 - 资产报告</h1>
                <div style="color:#a855f7; margin-top:5px; font-weight: bold; font-size: 10px; letter-spacing: 1px;" id="pdfSubTitle">CONFIDENTIAL_DATA_ARCHIVE</div>
            </div>
            <div style="text-align:right;">
                <p id="pdf-asn" style="margin:0; font-weight:bold; font-size: 12px; color: #000;"></p>
                <p id="pdf-date" style="margin:0; font-size:10px; color:#666;"></p>
            </div>
        </div>
        
        <div id="pdf-content" class="prose prose-slate max-w-none"></div>
        
        <div style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee; display: flex; justify-content: space-between; font-size: 10px; color: #888;">
            <div>
                HUB: <strong>https://tools.lbuding.com</strong> | WECHAT: <strong>lengbuding0101</strong>
            </div>
            <div style="text-align: right;">© Pudding Lab Confidential</div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto space-y-12">
        <header class="flex flex-col md:flex-row items-center justify-between gap-6 pb-10 border-b border-purple-500/10">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-purple-600 rounded-[1.5rem] flex items-center justify-center font-black text-white text-3xl shadow-[0_0_30px_rgba(168,85,247,0.3)]">V</div>
                <div><h1 class="text-3xl font-black text-white tracking-tighter uppercase">资产指挥中心</h1><p class="text-[10px] text-purple-400 font-bold mono uppercase tracking-[0.4em]" id="opName">LOADING...</p></div>
            </div>
            <div class="flex flex-col md:flex-row items-center gap-4 w-full md:w-auto">
                <input type="search" id="assetSearch" oninput="handleSearch()" placeholder="搜索档案..." class="px-6 py-2.5 rounded-full text-xs w-full md:w-64 bg-slate-900 border-none text-white outline-none">
                <div class="flex gap-2">
                    <a href="/" class="px-6 py-3 bg-slate-800/40 border border-white/5 rounded-full text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-white transition-all shadow-sm">返回基地</a>
                    <button id="syncBtn" onclick="fetchAssets(true)" class="px-6 py-3 border border-purple-500/30 text-purple-400 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-purple-600 hover:text-white transition-all shadow-sm">刷新资产</button>
                </div>
            </div>
        </header>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 glass-panel p-8 rounded-[2.5rem]"><div class="h-56"><canvas id="trendChart"></canvas></div></div>
            <div class="glass-panel p-8 rounded-[2.5rem] flex items-center justify-center relative"><canvas id="typeChart"></canvas><div class="absolute text-2xl font-black text-white" id="totalAssetCount">0</div></div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div onclick="setFilter('all')" id="filter-all" class="stat-card p-8 rounded-[2.5rem] flex flex-col justify-between h-40 active">
                <div class="text-[10px] mono text-purple-400 uppercase tracking-widest">全量库存</div><div class="text-4xl font-black text-white" id="stat-all">0</div>
            </div>
            <div onclick="setFilter('factory')" id="filter-factory" class="stat-card p-8 rounded-[2.5rem] flex flex-col justify-between h-40 border-blue-500/30">
                <div class="text-[10px] mono text-blue-400 uppercase tracking-widest">工厂蓝图</div><div class="text-4xl font-black text-white" id="stat-factory">0</div>
            </div>
            <div onclick="setFilter('radar')" id="filter-radar" class="stat-card p-8 rounded-[2.5rem] flex flex-col justify-between h-40 border-emerald-500/30">
                <div class="text-[10px] mono text-emerald-400 uppercase tracking-widest">雷达情报</div><div class="text-4xl font-black text-white" id="stat-radar">0</div>
            </div>
        </div>

        <main id="assetGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-32"></main>
    </div>

    <div id="viewModal" class="fixed inset-0 z-[100] bg-black/98 backdrop-blur-3xl p-6 md:p-12 hidden">
        <div class="max-w-4xl mx-auto h-full flex flex-col">
            <div class="flex justify-between items-center mb-10">
                <div class="text-[10px] font-black text-purple-500 mono uppercase tracking-widest">Archive_Access_v3.7</div>
                <div class="flex gap-4">
                    <button id="pdfBtn" class="px-6 py-2 bg-purple-600 text-white rounded-full text-[10px] font-bold uppercase hover:bg-purple-500 transition-all">导出文本 PDF 资产</button>
                    <button onclick="closeModal()" class="px-6 py-2 border border-white/10 rounded-full text-[10px] font-bold text-slate-400 hover:bg-red-600 transition-all">关闭</button>
                </div>
            </div>
            <div id="modalBody" class="flex-1 overflow-y-auto prose prose-invert prose-purple max-w-none pr-4 scroll-smooth"></div>
        </div>
    </div>

    <script>
        const ASSETS_API = "https://nas-n8n.lbuding.com/webhook/get-user-assets";
        const DELETE_API = "https://nas-n8n.lbuding.com/webhook/delete-asset";

        let globalData = { factory: [], radar: [] };
        let activeAsset = null;
        let currentFilter = 'all';
        let currentSearch = '';
        let charts = { trend: null, type: null };

        function showNotify(msg, type = 'success') {
            const container = document.getElementById('notify-container');
            const card = document.createElement('div');
            card.className = `notify-card mono text-[11px] font-bold text-purple-300`;
            card.innerHTML = `⚡ ${msg}`;
            container.appendChild(card);
            setTimeout(() => { card.style.opacity = '0'; setTimeout(() => card.remove(), 500); }, 3000);
        }

        window.onload = () => {
            const t = localStorage.getItem('pudding_token'), u = localStorage.getItem('pudding_user'), cached = localStorage.getItem('pudding_assets');
            if (!t) { window.location.href = "/"; return; }
            document.getElementById('opName').innerText = `OPERATOR: ${u.toUpperCase()}`;
            if (cached) { globalData = JSON.parse(cached); renderUI(); initCharts(); } else { fetchAssets(false); }
            setTimeout(() => { document.getElementById('lockscreen').style.opacity = '0'; setTimeout(() => document.getElementById('lockscreen').style.display = 'none', 500); }, 500);
        };

        async function fetchAssets(isManual = false) {
            const t = localStorage.getItem('pudding_token'), e = localStorage.getItem('pudding_email');
            try {
                const res = await fetch(ASSETS_API, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${t}` }, body: JSON.stringify({ email: e }) });
                const data = await res.json();
                globalData.factory = data.factory || []; globalData.radar = data.radar || [];
                localStorage.setItem('pudding_assets', JSON.stringify(globalData));
                renderUI(); initCharts();
                if (isManual) showNotify("同步完成");
            } catch (err) { showNotify("同步受阻", "error"); }
        }

        function renderUI() {
            const totalCount = globalData.factory.length + globalData.radar.length;
            document.getElementById('stat-all').innerText = totalCount;
            document.getElementById('stat-factory').innerText = globalData.factory.length;
            document.getElementById('stat-radar').innerText = globalData.radar.length;
            document.getElementById('totalAssetCount').innerText = totalCount;
            const grid = document.getElementById('assetGrid'); grid.innerHTML = '';
            const allItems = [...globalData.factory.map((item, i) => ({ ...item, _type: 'factory', _idx: i })), ...globalData.radar.map((item, i) => ({ ...item, _type: 'radar', _idx: i }))].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const filtered = allItems.filter(item => (currentFilter === 'all' || item._type === currentFilter) && (item.sector || item.location || "").toLowerCase().includes(currentSearch));
            filtered.forEach(item => {
                const isF = item._type === 'factory';
                const accent = isF ? 'text-blue-500' : 'text-emerald-500';
                const card = document.createElement('div');
                card.className = `glass-panel p-8 rounded-[2.5rem] asset-card border border-white/5`;
                card.onclick = () => openModal(item._type, item._idx);
                card.innerHTML = `<button onclick="handleDelete(event, '${item._type}', ${item.id})" class="shredder-btn text-[10px] font-black">✕</button>
                    <div class="flex justify-between items-start mb-6"><span class="mono text-[9px] ${accent} font-bold bg-white/5 px-2 py-1 rounded">${item._type.toUpperCase()}</span><span class="text-[9px] text-slate-600 mono">${new Date(item.created_at).toLocaleDateString()}</span></div>
                    <h4 class="text-white font-black text-xl mb-4 line-clamp-2 uppercase">${isF ? item.sector : item.location}</h4>
                    <div class="mt-auto pt-4 border-t border-white/5 text-[10px] mono ${accent} font-bold italic">ASN_${item.id} →</div>`;
                grid.appendChild(card);
            });
        }

        function openModal(type, idx) {
            activeAsset = globalData[type][idx]; activeAsset._type = type;
            const content = activeAsset.blueprint_content || activeAsset.report_content;
            document.getElementById('modalBody').innerHTML = marked.parse(content);
            document.getElementById('viewModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            document.getElementById('pdfBtn').onclick = () => generatePrintPDF(activeAsset, content);
        }

        // 🚀 核心打印引擎 V3.7
        function generatePrintPDF(asset, markdown) {
            const isF = asset._type === 'factory';
            const printContent = document.getElementById('pdf-content');

            // 1. 注入元数据
            document.getElementById('pdfSubTitle').innerText = isF ? "BLUEPRINT_ASSET_REPORT" : "RADAR_INTEL_REPORT";
            document.getElementById('pdfSubTitle').style.color = isF ? "#3b82f6" : "#10b981";
            document.getElementById('pdf-asn').innerText = `ASN: ${asset.id}`;
            document.getElementById('pdf-date').innerText = `DATE: ${new Date(asset.created_at).toLocaleString()}`;
            
            // 2. 注入内容并强制触发布局更新
            printContent.innerHTML = marked.parse(markdown);

            showNotify("正在解析情报图谱，请在弹出窗口选‘另存为 PDF’");

            // 3. 增加到 800ms 延迟，确保手机端完成 Markdown 渲染绘制
            setTimeout(() => {
                window.print();
            }, 800);
        }

        function initCharts() {
            const ctxTrend = document.getElementById('trendChart').getContext('2d');
            const ctxType = document.getElementById('typeChart').getContext('2d');
            if(charts.trend) charts.trend.destroy(); if(charts.type) charts.type.destroy();
            const days = Array.from({length: 7}, (_, i) => { const d = new Date(); d.setDate(d.getDate() - i); return d.toISOString().split('T')[0]; }).reverse();
            const counts = days.map(day => [...globalData.factory, ...globalData.radar].filter(i => i.created_at.startsWith(day)).length);
            charts.trend = new Chart(ctxTrend, { type: 'line', data: { labels: days.map(d => d.slice(5)), datasets: [{ data: counts, borderColor: '#a855f7', borderWidth: 3, pointRadius: 4, fill: true, backgroundColor: 'rgba(168, 85, 247, 0.05)', tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { border: { display: false }, grid: { color: 'rgba(255,255,255,0.03)' } } } } });
            charts.type = new Chart(ctxType, { type: 'doughnut', data: { labels: ['Factory', 'Radar'], datasets: [{ data: [globalData.factory.length, globalData.radar.length], backgroundColor: ['#3b82f6', '#10b981'], borderWidth: 0, cutout: '85%' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        }

        async function handleDelete(e, type, id) { e.stopPropagation(); if (!confirm(`确认销毁记录 ${id}？`)) return; try { const res = await fetch(DELETE_API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, type, email: localStorage.getItem('pudding_email') }) }); if (res.ok) fetchAssets(true); } catch (err) { } }
        function handleSearch() { currentSearch = document.getElementById('assetSearch').value.toLowerCase(); renderUI(); }
        function setFilter(type) { currentFilter = type; document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active')); document.getElementById(`filter-${type}`).classList.add('active'); renderUI(); }
        function closeModal() { document.getElementById('viewModal').classList.add('hidden'); document.body.style.overflow = 'auto'; }
    </script>
</body>
</html>
