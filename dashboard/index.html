<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资产指挥中心 | 布丁实验室</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --vault-purple: #a855f7; --bg-dark: #020617; }
        
        body { background-color: var(--bg-dark); color: #94a3b8; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .tech-grid { background-image: radial-gradient(rgba(168, 85, 247, 0.1) 1px, transparent 0); background-size: 30px 30px; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(168, 85, 247, 0.15); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* 统计卡片渐变设计 */
        .stat-card { background: linear-gradient(135deg, rgba(168, 85, 247, 0.15) 0%, rgba(15, 23, 42, 1) 100%); border: 1px solid rgba(168, 85, 247, 0.2); }
        .asset-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .asset-card:hover { transform: translateY(-5px); border-color: var(--vault-purple); box-shadow: 0 15px 35px rgba(168, 85, 247, 0.2); }
        
        #lockscreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: opacity 0.5s ease; }
        #notify-container { position: fixed; top: 24px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
        .notify-card { pointer-events: auto; min-width: 280px; padding: 16px 20px; border-radius: 12px; border: 1px solid rgba(168, 85, 247, 0.3); background: rgba(15, 23, 42, 0.95); animation: slideIn 0.4s forwards; }
        
        @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="tech-grid p-4 md:p-12">

    <div id="notify-container"></div>

    <div id="lockscreen">
        <div id="lockTitle" class="text-purple-500 font-bold mono animate-pulse tracking-[0.5em] text-lg uppercase">VAULT_SYNCING...</div>
        <div id="lockSub" class="mt-4 text-[10px] text-slate-600 mono uppercase">建立私密数据加密链路</div>
    </div>

    <div class="max-w-7xl mx-auto space-y-12">
        
        <header class="flex flex-col md:flex-row items-center justify-between gap-6 pb-10 border-b border-purple-500/10">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-purple-600 rounded-[1.5rem] flex items-center justify-center font-black text-white text-3xl shadow-[0_0_30px_rgba(168,85,247,0.3)]">V</div>
                <div>
                    <h1 class="text-3xl font-black text-white tracking-tighter uppercase">资产指挥中心</h1>
                    <p class="text-[10px] text-purple-400 font-bold mono tracking-[0.4em]" id="opName">OPERATOR: ACCESSING...</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <a href="/" class="px-6 py-2.5 bg-slate-800/50 border border-white/10 rounded-full text-[11px] font-bold text-slate-400 uppercase tracking-widest hover:bg-slate-700 hover:text-white transition-all">返回基地</a>
                <button onclick="fetchAssets()" class="px-6 py-2.5 border border-purple-500/30 text-purple-400 rounded-full text-[11px] font-bold uppercase tracking-widest hover:bg-purple-600 hover:text-white transition-all">刷新资产库</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="stat-card p-8 rounded-[2.5rem] flex flex-col justify-between h-44">
                <div class="text-[10px] mono text-purple-400 uppercase tracking-widest">特工级别 / Status</div>
                <div class="text-4xl font-black text-white italic" id="stat-role">ARCHITECT</div>
            </div>
            <div class="stat-card p-8 rounded-[2.5rem] flex flex-col justify-between h-44 border-blue-500/30">
                <div class="text-[10px] mono text-blue-400 uppercase tracking-widest">工厂蓝图 / Factory</div>
                <div class="text-4xl font-black text-white" id="stat-factory">0 UNITS</div>
            </div>
            <div class="stat-card p-8 rounded-[2.5rem] flex flex-col justify-between h-44 border-emerald-500/30">
                <div class="text-[10px] mono text-emerald-400 uppercase tracking-widest">雷达报告 / Radar</div>
                <div class="text-4xl font-black text-white" id="stat-radar">0 UNITS</div>
            </div>
        </div>

        <main class="space-y-16">
            <section>
                <h3 class="text-xs font-black text-blue-500 uppercase tracking-[0.3em] mb-8 flex items-center gap-3">
                    <span class="w-2 h-2 bg-blue-500 rounded-full"></span> 灵感价值工厂资产
                </h3>
                <div id="factoryGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <div class="col-span-full py-10 text-center mono text-slate-700">正在检索蓝图库...</div>
                </div>
            </section>

            <section>
                <h3 class="text-xs font-black text-emerald-500 uppercase tracking-[0.3em] mb-8 flex items-center gap-3">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full"></span> 全球套利雷达情报
                </h3>
                <div id="radarGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <div class="col-span-full py-10 text-center mono text-slate-700">正在同步雷达波段...</div>
                </div>
            </section>
        </main>
    </div>

    <div id="viewModal" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-2xl p-6 md:p-12 hidden">
        <div class="max-w-4xl mx-auto h-full flex flex-col">
            <div class="flex justify-between items-center mb-10">
                <div class="text-[10px] font-black text-purple-500 mono uppercase tracking-widest">Decrypted_Asset_View</div>
                <button onclick="closeModal()" class="px-5 py-2 border border-white/10 rounded-full text-xs font-bold text-slate-400 hover:bg-red-600 hover:text-white transition-all">关闭 / CLOSE</button>
            </div>
            <div id="modalBody" class="flex-1 overflow-y-auto prose prose-invert prose-purple max-w-none scroll-smooth"></div>
        </div>
    </div>

    <script>
        const ASSETS_API = "https://nas-n8n.lbuding.com/webhook/get-user-assets";
        const PROFILE_API = "https://nas-n8n.lbuding.com/webhook/get-user-profile";

        let globalData = { factory: [], radar: [] };

        function showNotify(msg, type = 'success') {
            const container = document.getElementById('notify-container');
            const card = document.createElement('div');
            card.className = `notify-card mono text-[11px] font-bold text-purple-300`;
            card.innerHTML = `⚡ ${msg}`;
            container.appendChild(card);
            setTimeout(() => { card.style.opacity = '0'; setTimeout(() => card.remove(), 500); }, 3000);
        }

        window.onload = async () => {
            const t = localStorage.getItem('pudding_token');
            const e = localStorage.getItem('pudding_email');
            const u = localStorage.getItem('pudding_user');

            if (!t || !e) { window.location.href = "/"; return; }

            document.getElementById('opName').innerText = `OPERATOR: ${u.toUpperCase()}`;

            // 1. 获取身份并修复 ACCESSING... 问题
            try {
                const res = await fetch(PROFILE_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${t}` },
                    body: JSON.stringify({ email: e })
                });
                const data = await res.json();
                // 兼容 n8n 可能返回的数组格式或对象格式
                const userRole = Array.isArray(data) ? data[0].role : data.role;
                document.getElementById('stat-role').innerText = (userRole || 'AGENT').toUpperCase();
            } catch (err) {
                document.getElementById('stat-role').innerText = "OFFLINE";
            }

            // 2. 解锁并拉取资产
            setTimeout(() => {
                document.getElementById('lockscreen').style.opacity = '0';
                setTimeout(() => document.getElementById('lockscreen').style.display = 'none', 500);
                fetchAssets();
            }, 800);
        };

        async function fetchAssets() {
            const t = localStorage.getItem('pudding_token');
            const e = localStorage.getItem('pudding_email');
            
            try {
                const res = await fetch(ASSETS_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${t}` },
                    body: JSON.stringify({ email: e })
                });
                
                const data = await res.json();
                
                // 兼容处理：确保 factory 和 radar 是数组
                globalData.factory = data.factory || [];
                globalData.radar = data.radar || [];
                
                document.getElementById('stat-factory').innerText = `${globalData.factory.length} UNITS`;
                document.getElementById('stat-radar').innerText = `${globalData.radar.length} UNITS`;
                
                renderGrid('factoryGrid', globalData.factory, 'factory');
                renderGrid('radarGrid', globalData.radar, 'radar');
                showNotify("加密资产链路同步成功");

            } catch (err) {
                showNotify("无法连接数据中心", "error");
            }
        }

        function renderGrid(containerId, data, type) {
            const grid = document.getElementById(containerId);
            if (!data || data.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-10 text-center border border-dashed border-white/5 rounded-2xl opacity-30 mono text-xs uppercase tracking-widest">No_Data_Found</div>`;
                return;
            }

            const isFactory = type === 'factory';
            const accentColor = isFactory ? 'text-blue-500' : 'text-emerald-500';
            const accentBorder = isFactory ? 'border-blue-500/20' : 'border-emerald-500/20';

            grid.innerHTML = data.map((item, index) => {
                // 智能提取标题：工厂看 sector，雷达看 location
                const title = isFactory ? (item.sector || '灵感蓝图') : (item.location || '全球情报');
                const date = new Date(item.created_at).toLocaleDateString();
                
                return `
                <div class="glass-panel p-8 rounded-[2.5rem] asset-card flex flex-col h-64 border ${accentBorder}" onclick="openModal('${type}', ${index})">
                    <div class="flex justify-between items-start mb-6">
                        <span class="mono text-[9px] ${accentColor} font-bold bg-white/5 px-2 py-1 rounded">ASN-${String(index + 1).padStart(3, '0')}</span>
                        <span class="text-[9px] text-slate-600 mono">${date}</span>
                    </div>
                    <h4 class="text-white font-black text-xl mb-4 line-clamp-2 leading-tight uppercase tracking-tight">
                        ${title}
                    </h4>
                    <div class="mt-auto flex items-center justify-between pt-4 border-t border-white/5">
                        <span class="text-[9px] mono uppercase text-slate-500 tracking-tighter">${isFactory ? 'Blueprint_Archive' : 'Radar_Intel'}</span>
                        <span class="text-[10px] mono ${accentColor} font-bold tracking-tighter">DECRYPT →</span>
                    </div>
                </div>
            `;}).join('');
        }

        function openModal(type, index) {
            const item = globalData[type][index];
            // 兼容不同表的字段名：factory 用 blueprint_content，radar 用 report_content
            const content = item.blueprint_content || item.report_content || "档案内容已损坏。";
            document.getElementById('modalBody').innerHTML = marked.parse(content);
            document.getElementById('viewModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('viewModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
